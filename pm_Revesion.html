<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Management - Master's Study Guide</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&family=Noto+Sans+Arabic:wght@300;400;600;700&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --card: #222632;
  --card-hover: #2a2e3c;
  --accent: #e8983e;
  --accent2: #d4763a;
  --text: #e8e6e3;
  --text-dim: #9b9a97;
  --border: #2f3340;
  --success: #4caf50;
  --error: #ef5350;
  --info: #42a5f5;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
}

.arabic-text {
  font-family: 'Noto Sans Arabic', 'Source Sans 3', sans-serif;
  direction: rtl;
  text-align: right;
  line-height: 2;
}

h1, h2, h3, h4 {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
}

/* HERO */
.hero {
  min-height: 50vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(135deg, #0f1117 0%, #1a1d27 40%, #22263290 100%);
  border-bottom: 2px solid var(--accent);
  position: relative;
}
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 30% 50%, rgba(232,152,62,0.08) 0%, transparent 50%),
              radial-gradient(circle at 70% 50%, rgba(212,118,58,0.05) 0%, transparent 50%);
}
.hero-content { position: relative; z-index: 1; max-width: 800px; }
.hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 16px; font-weight: 900; }
.hero h1 span { color: var(--accent); }
.hero p { font-size: 1.15rem; color: var(--text-dim); max-width: 600px; margin: 0 auto; }

/* NAV */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(15,17,23,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  overflow-x: auto;
}
.nav-bar::-webkit-scrollbar { height: 0; }
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 4px;
}
.nav-btn {
  padding: 14px 18px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* CONTAINER */
.container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }

/* SECTION */
.section { margin-bottom: 60px; display: none; }
.section.active { display: block; }
.section-header {
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--accent);
}
.section-header h2 { font-size: 2rem; margin-bottom: 8px; }
.section-header .subtitle { color: var(--text-dim); font-size: 1rem; }

/* FLIP CARD */
.card-grid { display: flex; flex-direction: column; gap: 24px; }
.flip-card-container { perspective: 1200px; }
.flip-card {
  position: relative;
  width: 100%;
  min-height: 200px;
  transition: transform 0.6s ease;
  transform-style: preserve-3d;
}
.flip-card.flipped { transform: rotateY(180deg); }

.flip-front, .flip-back {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  min-height: 200px;
  backface-visibility: hidden;
  border-radius: var(--radius);
  padding: 28px;
  border: 1px solid var(--border);
}
.flip-front {
  background: var(--card);
}
.flip-back {
  background: linear-gradient(135deg, #1e2233 0%, #252a3a 100%);
  transform: rotateY(180deg);
  border-color: var(--accent2);
}

/* Make flip card work with dynamic height */
.flip-card-container { position: relative; }
.flip-card { position: relative; }
.flip-front, .flip-back { position: relative; }
.flip-card:not(.flipped) .flip-back { display: none; }
.flip-card.flipped .flip-front { display: none; }
.flip-card.flipped .flip-back { display: block; }

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  color: var(--accent);
  margin-bottom: 14px;
  font-weight: 700;
}
.card-content { font-size: 0.95rem; line-height: 1.8; }
.card-content p { margin-bottom: 10px; }
.card-content strong { color: var(--accent); font-weight: 600; }
.card-content ul { padding-left: 20px; margin-bottom: 10px; }
.card-content li { margin-bottom: 4px; }

.flip-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 16px;
  padding: 8px 18px;
  background: rgba(232,152,62,0.12);
  color: var(--accent);
  border: 1px solid rgba(232,152,62,0.3);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.2s;
}
.flip-btn:hover { background: rgba(232,152,62,0.22); }

/* EXAMPLE BOX */
.example-box {
  background: rgba(232,152,62,0.06);
  border-left: 3px solid var(--accent);
  padding: 16px 20px;
  border-radius: 0 8px 8px 0;
  margin: 12px 0;
  font-size: 0.9rem;
}
.example-box .label { font-weight: 700; color: var(--accent); margin-bottom: 4px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

.formula-box {
  background: rgba(66,165,245,0.08);
  border-left: 3px solid var(--info);
  padding: 16px 20px;
  border-radius: 0 8px 8px 0;
  margin: 12px 0;
  font-family: monospace;
  font-size: 0.95rem;
}

/* QUIZ */
.quiz-controls {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 30px;
}
.quiz-controls h3 { font-size: 1.3rem; margin-bottom: 16px; color: var(--accent); }

.lecture-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}
.filter-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.85rem;
  color: var(--text-dim);
  transition: all 0.2s;
  user-select: none;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text); }
.filter-chip.selected { background: rgba(232,152,62,0.15); border-color: var(--accent); color: var(--accent); }

.quiz-num-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.quiz-num-row label { font-weight: 600; font-size: 0.95rem; }
.quiz-num-input {
  width: 80px;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 1rem;
  font-family: 'Source Sans 3', sans-serif;
}

.btn {
  padding: 10px 24px;
  border-radius: 8px;
  border: none;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent2); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
.btn-outline:hover { border-color: var(--text); color: var(--text); }

.quiz-question {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  transition: border-color 0.3s;
}
.quiz-question.correct { border-color: var(--success); }
.quiz-question.incorrect { border-color: var(--error); }

.q-number { font-size: 0.8rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.q-text { font-size: 1rem; font-weight: 600; margin-bottom: 16px; line-height: 1.6; }
.q-text-ar { margin-top: 8px; }

.q-options { display: flex; flex-direction: column; gap: 8px; }
.q-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.92rem;
}
.q-option:hover { border-color: var(--accent); background: rgba(232,152,62,0.05); }
.q-option.selected { border-color: var(--accent); background: rgba(232,152,62,0.1); }
.q-option.show-correct { border-color: var(--success); background: rgba(76,175,80,0.1); }
.q-option.show-wrong { border-color: var(--error); background: rgba(239,83,80,0.1); }

.q-option input[type="radio"] { margin-top: 3px; accent-color: var(--accent); }

.q-explanation {
  margin-top: 14px;
  padding: 14px 18px;
  border-radius: 8px;
  font-size: 0.9rem;
  line-height: 1.6;
  display: none;
}
.q-explanation.visible { display: block; }
.q-explanation.correct-exp { background: rgba(76,175,80,0.08); border-left: 3px solid var(--success); }
.q-explanation.incorrect-exp { background: rgba(239,83,80,0.08); border-left: 3px solid var(--error); }

.quiz-result {
  background: var(--card);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 28px;
  margin-top: 24px;
  text-align: center;
  display: none;
}
.quiz-result.visible { display: block; }
.result-score { font-size: 3rem; font-family: 'Playfair Display', serif; font-weight: 900; color: var(--accent); }
.result-text { font-size: 1.1rem; margin-top: 8px; color: var(--text-dim); }

/* RESPONSIVE */
@media (max-width: 768px) {
  .hero h1 { font-size: 1.8rem; }
  .nav-btn { padding: 12px 12px; font-size: 0.78rem; }
  .container { padding: 24px 16px; }
  .flip-front, .flip-back { padding: 20px; }
  .lecture-filters { gap: 6px; }
  .filter-chip { padding: 6px 12px; font-size: 0.8rem; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* QBANK */

/* NOTES */
.note-group-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  color: var(--accent);
  margin: 36px 0 18px 0;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.note-group-title:first-of-type { margin-top: 0; }
.note-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 14px;
  overflow: hidden;
}
.note-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  cursor: pointer;
}
.note-card-header:hover { background: rgba(232,152,62,0.03); }
.note-icon {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 800;
  color: #fff;
}
.note-icon.warn { background: #e8983e; }
.note-icon.tip { background: #42a5f5; }
.note-icon.formula { background: #ab47bc; }
.note-icon.rule { background: #ef5350; }
.note-card-title { font-weight: 700; font-size: 0.95rem; flex: 1; }
.note-card-body {
  padding: 0 20px 18px 64px;
  font-size: 0.9rem;
  line-height: 1.8;
  color: var(--text-dim);
}
.note-card-body strong { color: var(--text); }

/* COMPARE TABLES */
.compare-section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  color: var(--accent);
  margin: 36px 0 18px 0;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.compare-section-title:first-of-type { margin-top: 0; }
.compare-table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-x: auto;
  margin-bottom: 20px;
}
.compare-table-title {
  padding: 16px 20px 8px 20px;
  font-weight: 700;
  font-size: 1rem;
  color: var(--accent);
}
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
.compare-table th {
  text-align: left;
  padding: 12px 16px;
  background: rgba(232,152,62,0.08);
  color: var(--accent);
  font-weight: 700;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.compare-table td {
  padding: 11px 16px;
  border-bottom: 1px solid rgba(47,51,64,0.5);
  line-height: 1.6;
  vertical-align: top;
}
.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:hover td { background: rgba(232,152,62,0.03); }
.compare-table .highlight { color: var(--accent); font-weight: 600; }

.toggle-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

@media (max-width: 768px) {
  .compare-table { font-size: 0.8rem; }
  .compare-table th, .compare-table td { padding: 8px 10px; }
  .note-card-body { padding-left: 20px; }
}

.qbank-toolbar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.qbank-search {
  width: 100%;
  padding: 12px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 1rem;
  font-family: 'Source Sans 3', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.qbank-search:focus { border-color: var(--accent); }
.qbank-search::placeholder { color: var(--text-dim); }
.qbank-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.qbank-tab {
  padding: 7px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-dim);
  transition: all 0.2s;
  font-family: 'Source Sans 3', sans-serif;
}
.qbank-tab:hover { border-color: var(--accent); color: var(--text); }
.qbank-tab.active { background: rgba(232,152,62,0.15); border-color: var(--accent); color: var(--accent); }
.qbank-count {
  font-size: 0.85rem;
  color: var(--text-dim);
  padding: 4px 0;
}

.qbank-group-header {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  color: var(--accent);
  margin: 32px 0 16px 0;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.qbank-group-header:first-of-type { margin-top: 0; }

.qbank-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.qbank-item:hover { border-color: rgba(232,152,62,0.3); }
.qbank-item-header {
  padding: 20px 24px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.qbank-item-header:hover { background: rgba(232,152,62,0.03); }
.qbank-q-text { font-size: 0.95rem; font-weight: 600; line-height: 1.6; flex: 1; }
.qbank-q-ar { font-size: 0.88rem; color: var(--text-dim); margin-top: 6px; line-height: 1.8; }
.qbank-badge {
  flex-shrink: 0;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  background: rgba(232,152,62,0.1);
  color: var(--accent);
  border: 1px solid rgba(232,152,62,0.2);
}
.qbank-expand-icon {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: var(--text-dim);
  transition: transform 0.3s, background 0.2s;
}
.qbank-item.open .qbank-expand-icon { transform: rotate(180deg); }

.qbank-answer {
  display: none;
  padding: 0 24px 20px 24px;
  border-top: 1px solid var(--border);
}
.qbank-item.open .qbank-answer { display: block; padding-top: 16px; }

.qbank-opt {
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 0.9rem;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--surface);
  border: 1px solid transparent;
}
.qbank-opt.is-correct {
  background: rgba(76,175,80,0.1);
  border-color: var(--success);
}
.qbank-opt-letter {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  background: var(--card);
  color: var(--text-dim);
}
.qbank-opt.is-correct .qbank-opt-letter {
  background: var(--success);
  color: #fff;
}
.qbank-explanation-box {
  margin-top: 14px;
  padding: 14px 18px;
  background: rgba(76,175,80,0.06);
  border-left: 3px solid var(--success);
  border-radius: 0 8px 8px 0;
  font-size: 0.88rem;
  line-height: 1.7;
}
.qbank-explanation-box .exp-label {
  font-weight: 700;
  color: var(--success);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

@media (max-width: 768px) {
  .qbank-item-header { padding: 16px; }
  .qbank-answer { padding: 0 16px 16px 16px; }
  .qbank-item.open .qbank-answer { padding-top: 14px; }
  .qbank-badge { font-size: 0.68rem; padding: 3px 8px; }
}

/* KEY NOTES */
.note-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}
.note-card-head {
  padding: 18px 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: background 0.2s;
}
.note-card-head:hover { background: rgba(232,152,62,0.03); }
.note-icon {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  font-weight: 800;
  color: #fff;
}
.note-card-title {
  flex: 1;
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
}
.note-arrow {
  font-size: 0.8rem;
  color: var(--text-dim);
  transition: transform 0.3s;
}
.note-card.open .note-arrow { transform: rotate(180deg); }
.note-body {
  display: none;
  padding: 0 24px 22px 24px;
  border-top: 1px solid var(--border);
}
.note-card.open .note-body { display: block; padding-top: 18px; }
.note-item {
  padding: 10px 0;
  border-bottom: 1px solid rgba(47,51,64,0.5);
  font-size: 0.92rem;
  line-height: 1.7;
  display: flex;
  gap: 10px;
}
.note-item:last-child { border-bottom: none; }
.note-bullet {
  flex-shrink: 0;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: 10px;
}
.note-group-label {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  color: var(--accent);
  margin: 36px 0 18px 0;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.note-group-label:first-child { margin-top: 0; }

/* COMPARISON TABLES */
.compare-section { margin-bottom: 36px; }
.compare-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  color: var(--accent);
  margin-bottom: 14px;
}
.compare-table-wrap {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
  min-width: 500px;
}
.compare-table th {
  background: rgba(232,152,62,0.12);
  color: var(--accent);
  font-weight: 700;
  padding: 14px 18px;
  text-align: left;

<p><strong>Collect Requirements</strong> produces the <strong>Requirements Documentation</strong> -- a categorized, prioritized, measurable, and testable list. Types include: business, stakeholder, solution (functional and non-functional), transition, project, and quality requirements.</p>

<p><strong>Create WBS</strong> (Work Breakdown Structure) is a hierarchical decomposition of the total scope. It is deliverable-oriented (expressed as nouns). The lowest level items are <strong>Work Packages</strong> -- the level at which costs and time can be reliably estimated.</p>

<p><strong>جمع المتطلبات (Collect Requirements)</strong> ينتج <strong>وثائق المتطلبات (Requirements Documentation)</strong> -- قائمة مصنفة ومرتبة وقابلة للقياس والاختبار.</p>
<p><strong>مصفوفة تتبع المتطلبات (Requirements Traceability Matrix - RTM)</strong> تربط المتطلبات بأهداف العمل وتتبعها طوال دورة الحياة.</p>
<p><strong>إنشاء هيكل تقسيم العمل (WBS)</strong> هو تقسيم هرمي لنطاق العمل الكلي. أدنى مستوى هو <strong>حزم العمل (Work Packages)</strong>.</p>
<p><strong>خط أساس النطاق (Scope Baseline)</strong> = بيان النطاق + هيكل تقسيم العمل + قاموس WBS (الثلاثة مطلوبون).</p>`
      },
      {
        title: 'Schedule Planning: Network Diagrams & Critical Path',
        en: `<p>Schedule planning involves defining activities, sequencing them, estimating durations, and developing the schedule.</p>
<p><strong>Precedence Diagramming Method (PDM)</strong> produces Activity-on-Node (AON) diagrams. Four relationship types:</p>
<ul>
<li><strong>Finish-to-Start (FS)</strong> -- most common: successor starts after predecessor finishes</li>
<li><strong>Start-to-Start (SS)</strong> -- both start around the same time (e.g., data migration and data validation)</li>
<li><strong>Finish-to-Finish (FF)</strong> -- both finish around the same time (e.g., coding and unit testing)</li>
<li><strong>Start-to-Finish (SF)</strong> -- rare: successor finishes when predecessor starts (e.g., new system go-live stops old system)</li>
</ul>
<p><strong>Lead</strong> = successor can start early. <strong>Lag</strong> = successor is delayed.</p>
<p><strong>Critical Path Method (CPM)</strong>: The critical path is the longest path through the network, determining the minimum project duration. Activities on the critical path have <strong>zero float/slack</strong>. Float and slack are synonyms.</p>
<div class="formula-box">Critical Path = Longest path in time = Shortest time to complete the project<br>Float = LS - ES = LF - EF</div>`,
        ar: `<p>تخطيط الجدول الزمني يتضمن تعريف الأنشطة، ترتيبها، تقدير مدتها، وتطوير الجدول الزمني.</p>
<p><strong>طريقة مخطط الأسبقية (PDM)</strong> تنتج مخططات النشاط على العقدة (AON). أربعة أنواع من العلاقات:</p>
<ul>
<li><strong>إنهاء إلى بدء (FS)</strong> -- الأكثر شيوعا: اللاحق يبدأ بعد انتهاء السابق</li>
<li><strong>بدء إلى بدء (SS)</strong> -- كلاهما يبدأ في نفس الوقت تقريبا</li>
<li><strong>إنهاء إلى إنهاء (FF)</strong> -- كلاهما ينتهي في نفس الوقت تقريبا</li>
<li><strong>بدء إلى إنهاء (SF)</strong> -- نادر: اللاحق ينتهي عندما يبدأ السابق</li>
</ul>
<p><strong>المسار الحرج (Critical Path)</strong> هو أطول مسار عبر الشبكة، يحدد أقل مدة للمشروع. الأنشطة على المسار الحرج لها <strong>فترة عائمة صفرية (Zero Float/Slack)</strong>.</p>`
      },
      {
        title: 'Estimating Techniques',
        en: `<p>Three main estimating techniques:</p>
<p><strong>1. Analogous Estimating</strong> -- uses similar past projects as a basis. Quick and cheap but less accurate. Best for early planning when details are scarce.</p>
<p><strong>2. Parametric Estimating</strong> -- uses mathematical models (unit rate x quantity).</p>
<div class="example-box"><div class="label">Example</div>50 switches to install, each takes 2 hours = 100 total hours. With 4 technicians = 25 hours each.</div>
<p><strong>3. Bottom-Up Estimating</strong> -- estimates at the lowest level and aggregates upward. Most accurate but most time-consuming and expensive. Only as accurate as the WBS.</p>
<p><strong>Three-Point Estimating (PERT)</strong> uses three scenarios:</p>
<div class="formula-box">E = (P + 4M + O) / 6<br>Where: P = Pessimistic, M = Most Likely, O = Optimistic<br>Example: M=20, O=15, P=40 --> E = (40 + 80 + 15)/6 = 22.5</div>`,
        ar: `<p>ثلاث تقنيات رئيسية للتقدير:</p>
<p><strong>1. التقدير بالمقارنة (Analogous)</strong> -- يستخدم مشاريع سابقة مشابهة. سريع ورخيص لكن أقل دقة. الأفضل في التخطيط المبكر.</p>
<p><strong>2. التقدير البارامتري (Parametric)</strong> -- يستخدم نماذج رياضية (معدل الوحدة x الكمية).</p>
<p><strong>3. التقدير من أسفل لأعلى (Bottom-Up)</strong> -- يقدر على أدنى مستوى ويجمع لأعلى. الأكثر دقة لكن الأكثر تكلفة ووقتا.</p>
<p><strong>تقدير النقاط الثلاث (PERT)</strong>:</p>
<div class="formula-box">E = (P + 4M + O) / 6<br>حيث: P = متشائم، M = الأرجح، O = متفائل<br>مثال: M=20, O=15, P=40 --> E = (40 + 80 + 15)/6 = 22.5</div>`
      },
      {
        title: 'Schedule Compression & Resource Optimization',
        en: `<p>When the schedule needs to be shortened, two main techniques:</p>
<p><strong>Crashing</strong> -- adding resources to critical path activities to reduce their duration. Trade-offs: increased costs, unrealistic alternatives, communication challenges. Goal: greatest compression for least cost.</p>
<p><strong>Fast Tracking</strong> -- overlapping activities that would normally be done in sequence (using lead time). Increases risk because activities are done in parallel.</p>
<p><strong>Resource Optimization</strong>:</p>
<ul>
<li><strong>Resource Smoothing</strong> -- adjusts activities within their float/slack only. Does not change the critical path.</li>
<li><strong>Resource Leveling</strong> -- adjusts activity dates to eliminate resource overloads. May extend the project schedule.</li>
</ul>
<p><strong>Critical Chain Method</strong> accounts for limited resources. Unlike CPM (which only considers time), CCM focuses on both time and resource constraints. It adds buffers (project buffer at the end, feeding buffers at intersections).</p>`,
        ar: `<p>عندما يحتاج الجدول الزمني للتقصير، هناك تقنيتان رئيسيتان:</p>
<p><strong>الضغط (Crashing)</strong> -- إضافة موارد للأنشطة على المسار الحرج لتقليل مدتها. الهدف: أكبر ضغط بأقل تكلفة. المقايضة: زيادة التكاليف.</p>
<p><strong>التتبع السريع (Fast Tracking)</strong> -- تداخل الأنشطة التي تُنفذ عادة بالتسلسل. يزيد المخاطر لأن الأنشطة تُنفذ بالتوازي.</p>
<p><strong>تحسين الموارد</strong>:</p>
<ul>
<li><strong>تنعيم الموارد (Resource Smoothing)</strong> -- يعدل الأنشطة ضمن الفترة العائمة فقط. لا يغير المسار الحرج.</li>
<li><strong>تسوية الموارد (Resource Leveling)</strong> -- يعدل تواريخ الأنشطة لإزالة التحميل الزائد للموارد. قد يمدد الجدول الزمني.</li>

      },
      {

</ul>
<p>Costs include all resources: direct costs, indirect costs, and special categories (like inflation). Costs are aggregated from activities to work packages to deliverables to phases to the project level (<strong>Cost Aggregation</strong>).</p>
<p>The <strong>Cost Baseline</strong> is the approved, time-phased budget used for measuring performance. It is part of the Project Management Plan and can only be changed through formal change control.</p>`,
        ar: `<p>إدارة التكلفة تتضمن تقدير التكاليف وتحديد الميزانية.</p>

<p>التكاليف تشمل جميع الموارد: تكاليف مباشرة (Direct)، تكاليف غير مباشرة (Indirect)، وفئات خاصة.</p>

      {

        ar: `<p>تعريفات الجودة الرئيسية:</p>

      {
        title: 'Risk Planning & Response Strategies',
        en: `<p>Risk is an uncertain event that, if it occurs, has a positive or negative effect on project objectives. Risk Value = Probability x Impact.</p>
<p><strong>Qualitative Analysis</strong> = subjective prioritization using probability and impact scales. <strong>Quantitative Analysis</strong> = objective numerical analysis (EMV, Decision Trees, Simulations).</p>
<p><strong>Strategies for Threats (Negative Risks)</strong>:</p>
<ul>
<li><strong>Escalate</strong> -- outside project scope, managed at program/portfolio level</li>
<li><strong>Avoid</strong> -- eliminate the threat entirely</li>
<li><strong>Transfer</strong> -- shift impact to a third party (e.g., insurance)</li>
<li><strong>Mitigate</strong> -- reduce probability and/or impact (PROACTIVE)</li>
<li><strong>Accept</strong> -- acknowledge but take no action (REACTIVE)</li>
</ul>
<p><strong>Strategies for Opportunities (Positive Risks)</strong>:</p>
<ul>
<li><strong>Exploit</strong> -- increase probability to 100% (make it happen)</li>
<li><strong>Share</strong> -- partner with a third party to capture the opportunity</li>
<li><strong>Enhance</strong> -- improve probability/impact (less aggressive than exploit)</li>
<li><strong>Accept</strong> -- acknowledge but take no action</li>
</ul>
<div class="formula-box">EMV = Probability x Impact (monetary value)<br>Contingency Reserve = Sum of EMVs for known risks (controlled by PM)<br>Management Reserve = for unknown risks (controlled by senior management)</div>`,
        ar: `<p>المخاطر هي حدث غير مؤكد إذا حدث يكون له تأثير إيجابي أو سلبي على أهداف المشروع. قيمة المخاطر = الاحتمالية x التأثير.</p>

      {
        title: 'Procurement Planning & Contract Types',
        en: `<p>Procurement focuses on acquiring goods/services from outside the organization through contracts.</p>
<p><strong>Three basic contract types</strong>:</p>
<ul>
<li><strong>Fixed-Price (Lump Sum)</strong> -- seller assumes most risk. Seller must understand scope completely. If scope is unclear, both parties are at risk. The seller is legally obligated to complete the contract.</li>
<li><strong>Time & Material (Unit Price)</strong> -- risk is balanced between buyer and seller. Buyer agrees on price per unit; total price unknown initially. Buyer can control costs with not-to-exceed limits.</li>
<li><strong>Cost-Reimbursable (Cost Plus)</strong> -- buyer assumes most risk since costs are uncertain. No incentive for seller to control costs unless there is a ceiling. Often includes incentives or penalties.</li>
</ul>
<p><strong>Bid Documents</strong>: RFI (Request for Information) --> RFQ (Request for Quotation) --> RFP (Request for Proposal, most formal).</p>
<p><strong>Make-or-Buy Analysis</strong> considers cost (direct and indirect), technical ability, capacity, personnel availability, and intellectual property issues.</p>`,

<li><strong>الوقت والمواد (Time & Material)</strong> -- المخاطر متوازنة بين المشتري والبائع. يتم الاتفاق على سعر الوحدة؛ السعر الإجمالي غير معروف في البداية.</li>
<li><strong>التكلفة المسددة (Cost-Reimbursable/Cost Plus)</strong> -- المشتري يتحمل أعلى مخاطر لأن التكاليف غير مؤكدة. غالبا تتضمن حوافز أو عقوبات.</li>

<p><strong>وثائق المناقصة</strong>: طلب معلومات (RFI) --> طلب عرض أسعار (RFQ) --> طلب تقديم عروض (RFP، الأكثر رسمية).</p>`

    cards: [
      {
        title: 'Earned Value Management (EVM)',
        en: `<p>EVM is the primary technique for measuring project performance. Key terms:</p>
<ul>
<li><strong>PV (Planned Value)</strong> -- what you planned to spend for what you planned to do by now</li>
<li><strong>EV (Earned Value)</strong> -- what you planned to spend for what you have actually done</li>
<li><strong>AC (Actual Cost)</strong> -- what you have actually spent for everything done</li>
<li><strong>BAC (Budget at Completion)</strong> -- total approved budget</li>
</ul>
<div class="formula-box"><strong>Variance Formulas:</strong><br>CV (Cost Variance) = EV - AC (negative = over budget)<br>SV (Schedule Variance) = EV - PV (negative = behind schedule)<br><br><strong>Index Formulas:</strong><br>CPI (Cost Performance Index) = EV / AC (less than 1 = over budget)<br>SPI (Schedule Performance Index) = EV / PV (less than 1 = behind schedule)<br><br><strong>Forecasting:</strong><br>EAC = BAC / CPI (if current trend continues)<br>EAC = AC + (BAC - EV) (if variance was atypical, one-time)<br>EAC = AC + (BAC - EV) / (CPI x SPI) (considers both cost and schedule)<br>ETC = EAC - AC<br>VAC = BAC - EAC</div>
<div class="example-box"><div class="label">Worked Example</div>Project: 3 years, $2.5M. After 9 months: 20% done, $700K spent.<br>PV = 25% x $2.5M = $625,000 | EV = 20% x $2.5M = $500,000 | AC = $700,000<br>CV = $500K - $700K = -$200K (over budget) | SV = $500K - $625K = -$125K (behind schedule)<br>CPI = 0.71 | SPI = 0.80</div>`,
        ar: `<p>إدارة القيمة المكتسبة (EVM) هي التقنية الأساسية لقياس أداء المشروع:</p>
<ul>

<div class="formula-box"><strong>معادلات الانحراف:</strong><br>انحراف التكلفة CV = EV - AC (سالب = تجاوز الميزانية)<br>انحراف الجدول SV = EV - PV (سالب = تأخر عن الجدول)<br><br><strong>معادلات المؤشر:</strong><br>مؤشر أداء التكلفة CPI = EV / AC (أقل من 1 = تجاوز الميزانية)<br>مؤشر أداء الجدول SPI = EV / PV (أقل من 1 = تأخر عن الجدول)<br><br><strong>التنبؤ:</strong><br>EAC = BAC / CPI<br>ETC = EAC - AC<br>VAC = BAC - EAC</div>`
