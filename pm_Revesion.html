        ['SV (Schedule Variance)','EV - PV','Ahead of schedule','Behind schedule'],
        ['CPI (Cost Performance Index)','EV / AC','Under budget (efficient)','Over budget (inefficient)'],
        ['SPI (Schedule Performance Index)','EV / PV','Ahead of schedule','Behind schedule'],
      ],
      rows_ar: [
        ['انحراف التكلفة CV','EV - AC','تحت الميزانية','تجاوز الميزانية'],
        ['انحراف الجدول SV','EV - PV','متقدم عن الجدول','متأخر عن الجدول'],
        ['مؤشر أداء التكلفة CPI','EV / AC','تحت الميزانية (كفاءة)','تجاوز الميزانية (عدم كفاءة)'],
        ['مؤشر أداء الجدول SPI','EV / PV','متقدم عن الجدول','متأخر عن الجدول'],
      ]
    },
    {
      title: 'Cost Categories Matrix',
      title_ar: 'مصفوفة فئات التكاليف',
      headers: ['Category','Definition','Examples'],
      headers_ar: ['الفئة','التعريف','أمثلة'],
      rows: [
        ['Direct','Traceable to a specific project','Software, equipment, project-specific labor'],
        ['Indirect','Cannot be attributed to one project','Admin salaries, rent, utilities, security'],
        ['Variable','Changes with production volume','Raw materials, hourly wages, fuel'],
        ['Fixed','Remains constant regardless of volume','Rent, insurance, equipment leases'],
        ['Sunk','Already spent, cannot be recovered','Past investments -- should NOT influence future decisions'],
      ],
      rows_ar: [
        ['مباشرة','يمكن تتبعها لمشروع محدد','البرمجيات، المعدات، عمالة خاصة بالمشروع'],
        ['غير مباشرة','لا يمكن نسبها لمشروع واحد','رواتب الإدارة، الإيجار، المرافق، الأمن'],
        ['متغيرة','تتغير مع حجم الإنتاج','المواد الخام، الأجور بالساعة، الوقود'],
        ['ثابتة','تبقى ثابتة بغض النظر عن الحجم','الإيجار، التأمين، تأجير المعدات'],
        ['غارقة','تم إنفاقها ولا يمكن استردادها','استثمارات سابقة -- يجب ألا تؤثر على القرارات المستقبلية'],
      ]
    },
    {
      title: 'Validate Scope vs. Control Quality',
      title_ar: 'التحقق من النطاق مقابل مراقبة الجودة',
      headers: ['Aspect','Validate Scope','Control Quality'],
      headers_ar: ['الجانب','التحقق من النطاق','مراقبة الجودة'],
      rows: [
        ['Focus','Acceptance of deliverables','Correctness of deliverables'],
        ['Concept','Fitness for use (Validation)','Conformance to requirements (Verification)'],
        ['Performed by','Customer / Sponsor','Project team (internal)'],
        ['Timing','At milestones, phase/project end','Throughout execution, on every deliverable'],
        ['Input','Verified Deliverables (from QC)','Deliverables (from execution)'],
        ['Output','Accepted Deliverables','Verified Deliverables'],
        ['Order','AFTER Control Quality','BEFORE Validate Scope'],
      ],
      rows_ar: [
        ['التركيز','قبول المخرجات','صحة المخرجات'],
        ['المفهوم','ملاءمة الاستخدام (المصادقة)','المطابقة للمتطلبات (التحقق)'],
        ['يُنفذ بواسطة','العميل / الراعي','فريق المشروع (داخلي)'],
        ['التوقيت','عند المعالم، نهاية المرحلة/المشروع','طوال التنفيذ، على كل مخرج'],
        ['المدخل','مخرجات متحققة (من مراقبة الجودة)','مخرجات (من التنفيذ)'],
        ['المخرج','مخرجات مقبولة','مخرجات متحققة'],
        ['الترتيب','بعد مراقبة الجودة','قبل التحقق من النطاق'],
      ]
    },
    {
      title: 'Schedule Compression Techniques',
      title_ar: 'تقنيات ضغط الجدول الزمني',
      headers: ['Aspect','Crashing','Fast Tracking'],
      headers_ar: ['الجانب','الضغط (Crashing)','التتبع السريع (Fast Tracking)'],
      rows: [
        ['Method','Add resources to critical path activities','Overlap sequential activities'],
        ['Cost Impact','Increases cost','May increase cost (rework)'],
        ['Risk Impact','Communication challenges','Increases risk significantly'],
        ['Schedule Impact','Shortens critical path duration','Shortens overall duration'],
        ['Limitation','Greatest compression for least cost','Can only overlap activities with FS relationships'],
        ['Goal','Trade money for time','Trade risk for time'],
      ],
      rows_ar: [
        ['الطريقة','إضافة موارد لأنشطة المسار الحرج','تداخل الأنشطة المتسلسلة'],
        ['تأثير التكلفة','تزيد التكلفة','قد تزيد التكلفة (إعادة العمل)'],
        ['تأثير المخاطر','تحديات التواصل','تزيد المخاطر بشكل كبير'],
        ['تأثير الجدول','تقصر مدة المسار الحرج','تقصر المدة الإجمالية'],
        ['القيد','أكبر ضغط بأقل تكلفة','فقط أنشطة بعلاقة FS يمكن تداخلها'],
        ['الهدف','مقايضة المال بالوقت','مقايضة المخاطر بالوقت'],
      ]
    },
  ];

  comparisons.forEach(comp => {
    const useAr = compShowAr;
    const h = useAr ? comp.headers_ar : comp.headers;
    const r = useAr ? comp.rows_ar : comp.rows;
    const t = useAr ? comp.title_ar : comp.title;
    html += `<div class="compare-section">`;
    html += `<div class="compare-title">${comp.title}${useAr ? ' <span class="arabic-text" style="font-size:0.95rem;color:var(--text-dim);margin-right:8px;">'+comp.title_ar+'</span>' : ''}</div>`;
    html += `<div class="compare-table-wrap"><table class="compare-table">`;
    html += `<thead><tr>${h.map(hh=>'<th>'+hh+'</th>').join('')}</tr></thead>`;
    html += `<tbody>`;
    r.forEach(row => {
      html += `<tr>${row.map((c,ci)=> ci===0 ? '<td class="row-header">'+c+'</td>' : '<td>'+c+'</td>').join('')}</tr>`;
    });
    html += `</tbody></table></div></div>`;
  });
  html += `</div>`;

  // ========== Question Bank Section ==========
  html += `<div class="section ${activeTab==='qbank'?'active':''}" id="sec-qbank">`;
  html += `<div class="section-header"><h2>Question Bank</h2><p class="subtitle">All ${quizBank.length} questions with answers, grouped by lecture</p></div>`;

  // Toolbar
  html += `<div class="qbank-toolbar">`;
  html += `<input type="text" class="qbank-search" id="qbankSearchInput" placeholder="Search questions..." value="${qbankSearch}" oninput="onQbankSearch(this.value)">`;
  html += `<div class="qbank-tabs">`;
  const allQbankSelected = sections.every(s => qbankFilter[s.id]);
  html += `<div class="qbank-tab ${allQbankSelected?'active':''}" onclick="toggleQbankAll()">All Lectures</div>`;
  sections.forEach(sec => {
    const short = sec.title.split('. ')[1] || sec.title;
    const count = quizBank.filter(q => q.lecture === sec.id).length;
    html += `<div class="qbank-tab ${qbankFilter[sec.id]?'active':''}" onclick="toggleQbankFilter('${sec.id}')">${short} (${count})</div>`;
  });
  html += `</div>`;
  html += `<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">`;
  html += `<button class="btn btn-outline" onclick="toggleQbankAr()" style="font-size:0.85rem;padding:7px 16px;">${qbankShowAr ? 'Hide Arabic' : 'Show Arabic'}</button>`;
  html += `<button class="btn btn-outline" onclick="expandAllQbank()" style="font-size:0.85rem;padding:7px 16px;">Expand All</button>`;
  html += `<button class="btn btn-outline" onclick="collapseAllQbank()" style="font-size:0.85rem;padding:7px 16px;">Collapse All</button>`;
  html += `</div>`;
  html += `</div>`;

  // Filter and search
  const searchLower = qbankSearch.toLowerCase();
  const filteredQbank = quizBank.filter(q => {
    if (!qbankFilter[q.lecture]) return false;
    if (searchLower) {
      const haystack = (q.q + ' ' + q.q_ar + ' ' + q.options.join(' ') + ' ' + q.explanation + ' ' + q.explanation_ar).toLowerCase();
      return haystack.includes(searchLower);
    }
    return true;
  });

  html += `<div class="qbank-count">Showing ${filteredQbank.length} of ${quizBank.length} questions</div>`;

  // Group by lecture
  const lectureMap = {};
  sections.forEach(s => { lectureMap[s.id] = s.title; });

  const groupOrder = sections.map(s => s.id).filter(id => qbankFilter[id]);
  groupOrder.forEach(lecId => {
    const groupQs = filteredQbank.filter(q => q.lecture === lecId);
    if (groupQs.length === 0) return;
    html += `<div class="qbank-group-header">${lectureMap[lecId]} <span style="font-size:0.85rem;font-family:'Source Sans 3',sans-serif;font-weight:400;color:var(--text-dim);margin-left:8px;">(${groupQs.length} questions)</span></div>`;

    groupQs.forEach((q) => {
      const globalIdx = quizBank.indexOf(q);
      const isOpen = qbankRevealed[globalIdx] || false;
      const letters = ['A','B','C','D'];
      const shortLec = lectureMap[q.lecture]?.split('. ')[1] || q.lecture;

      html += `<div class="qbank-item ${isOpen?'open':''}" id="qbi-${globalIdx}">`;
      html += `<div class="qbank-item-header" onclick="toggleQbankItem(${globalIdx})">`;
      html += `<div style="flex:1;">`;
      html += `<div class="qbank-q-text">${q.q}</div>`;
      if (qbankShowAr) {
        html += `<div class="qbank-q-ar arabic-text">${q.q_ar}</div>`;
      }
      html += `</div>`;
      html += `<div class="qbank-expand-icon">&#9662;</div>`;
      html += `</div>`; // end header

      html += `<div class="qbank-answer">`;
      q.options.forEach((opt, oi) => {
        const isCorrect = oi === q.correct;
        html += `<div class="qbank-opt ${isCorrect?'is-correct':''}">
          <div class="qbank-opt-letter">${letters[oi]}</div>
          <div>${opt}</div>
        </div>`;
      });
      html += `<div class="qbank-explanation-box">`;
      html += `<div class="exp-label">Explanation</div>`;
      html += `<div>${q.explanation}</div>`;
      if (qbankShowAr) {
        html += `<div class="arabic-text" style="margin-top:8px;color:var(--text-dim);">${q.explanation_ar}</div>`;
      }
      html += `</div>`; // end explanation
      html += `</div>`; // end answer
      html += `</div>`; // end item
    });
  });

  html += `</div>`; // end qbank section

  // ========== Quiz Section ==========
  html += `<div class="section ${activeTab==='quiz'?'active':''}" id="sec-quiz">`;
  html += `<div class="section-header"><h2>PMP-Style Practice Exam</h2><p class="subtitle">Test your knowledge with questions based on PMP exam patterns</p></div>`;

  // Controls
  html += `<div class="quiz-controls">`;
  html += `<h3>Configure Your Exam</h3>`;
  html += `<p style="margin-bottom:12px;color:var(--text-dim);font-size:0.9rem;">Select which lectures to include:</p>`;
  html += `<div class="lecture-filters" id="lectureFilters">`;
  sections.forEach(sec => {
    const shortName = sec.title.split('. ')[1] || sec.title;
    const isChecked = filterState[sec.id];
    html += `<div class="filter-chip ${isChecked?'selected':''}" id="chip-${sec.id}" onclick="toggleFilter('${sec.id}')">
      ${shortName}
    </div>`;
  });
  html += `</div>`;
  html += `<div class="quiz-num-row">
    <label>Number of questions:</label>
    <input type="number" class="quiz-num-input" id="numQuestions" value="10" min="1" max="${quizBank.length}">
    <button class="btn btn-accent" onclick="startQuiz()">Start Exam</button>
    <button class="btn btn-outline" onclick="resetQuiz()">Reset</button>
    <button class="btn btn-outline" onclick="toggleQuizLang()" id="quizLangBtn">${showArabicQuiz ? 'Show English' : 'Show Arabic'}</button>
  </div>`;
  html += `</div>`;

  // Questions
  if (quizStarted) {
    html += `<div id="quizQuestions">`;
    selectedQuestions.forEach((q, qi) => {
      let qClass = '';
      if (quizSubmitted) {
        qClass = userAnswers[qi] === q.correct ? 'correct' : 'incorrect';
      }
      html += `<div class="quiz-question ${qClass}">`;
      html += `<div class="q-number">Question ${qi+1} of ${selectedQuestions.length}</div>`;
      html += `<div class="q-text">${q.q}</div>`;
      if (showArabicQuiz) {
        html += `<div class="q-text q-text-ar arabic-text" style="color:var(--text-dim);font-size:0.9rem;">${q.q_ar}</div>`;
      }
      html += `<div class="q-options">`;
      q.options.forEach((opt, oi) => {
        let optClass = '';
        if (quizSubmitted) {
          if (oi === q.correct) optClass = 'show-correct';
          else if (userAnswers[qi] === oi && oi !== q.correct) optClass = 'show-wrong';
        } else if (userAnswers[qi] === oi) {
          optClass = 'selected';
        }
        html += `<label class="q-option ${optClass}" onclick="${quizSubmitted?'':'selectAnswer('+qi+','+oi+')'}">
          <input type="radio" name="q${qi}" ${userAnswers[qi]===oi?'checked':''} ${quizSubmitted?'disabled':''}>
          ${opt}
        </label>`;
      });
      html += `</div>`;
      if (quizSubmitted) {
        const isCorrect = userAnswers[qi] === q.correct;
        html += `<div class="q-explanation visible ${isCorrect?'correct-exp':'incorrect-exp'}">
          <strong>${isCorrect ? 'Correct!' : 'Incorrect.'}</strong> ${q.explanation}
          ${showArabicQuiz ? '<br><span class="arabic-text" style="display:block;margin-top:6px;">'+q.explanation_ar+'</span>' : ''}
        </div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;

    if (!quizSubmitted) {
      html += `<div style="text-align:center;margin-top:24px;"><button class="btn btn-accent" onclick="submitQuiz()" style="font-size:1.1rem;padding:14px 40px;">Submit Exam</button></div>`;
    }

    if (quizSubmitted) {
      const score = selectedQuestions.reduce((acc, q, i) => acc + (userAnswers[i] === q.correct ? 1 : 0), 0);
      const pct = Math.round((score / selectedQuestions.length) * 100);
      html += `<div class="quiz-result visible">
        <div class="result-score">${score} / ${selectedQuestions.length}</div>
        <div class="result-text">You scored ${pct}% ${pct >= 70 ? '-- Well done!' : '-- Keep studying!'}</div>
        <button class="btn btn-accent" onclick="resetQuiz()" style="margin-top:16px;">Take Another Exam</button>
      </div>`;
    }
  }
  html += `</div>`;

  main.innerHTML = html;
}

function switchTab(id) {
  activeTab = id;
  render();
  window.scrollTo({top: document.querySelector('.nav-bar').offsetTop, behavior: 'smooth'});
}

function flipCard(id) {
  const el = document.getElementById('card-' + id);
  el.classList.toggle('flipped');
}

function toggleFilter(id) {
  filterState[id] = !filterState[id];
  const chip = document.getElementById('chip-' + id);
  chip.classList.toggle('selected');
}

function startQuiz() {
  const num = parseInt(document.getElementById('numQuestions').value) || 10;
  const selected = sections.map(s=>s.id).filter(id => filterState[id]);
  if (selected.length === 0) { alert('Please select at least one lecture.'); return; }
  let pool = quizBank.filter(q => selected.includes(q.lecture));
  if (pool.length === 0) { alert('No questions available for selected lectures.'); return; }
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  selectedQuestions = pool.slice(0, Math.min(num, pool.length));
  userAnswers = {};
  quizStarted = true;
  quizSubmitted = false;
  render();
}

function selectAnswer(qi, oi) {
  userAnswers[qi] = oi;
  render();
}

function submitQuiz() {
  if (Object.keys(userAnswers).length < selectedQuestions.length) {
    if (!confirm('You have unanswered questions. Submit anyway?')) return;
  }
  quizSubmitted = true;
  render();
  document.querySelector('.quiz-result')?.scrollIntoView({behavior:'smooth'});
}

function resetQuiz() {
  quizStarted = false;
  quizSubmitted = false;
  selectedQuestions = [];
  userAnswers = {};
  sections.forEach(s => filterState[s.id] = true);
  render();
}

function toggleQuizLang() {
  showArabicQuiz = !showArabicQuiz;
  render();
}

// ========== Question Bank Functions ==========
let qbankSearchTimeout = null;
function onQbankSearch(val) {
  clearTimeout(qbankSearchTimeout);
  qbankSearchTimeout = setTimeout(() => {
    qbankSearch = val;
    renderQbankOnly();
  }, 250);
}

function toggleQbankFilter(id) {
  qbankFilter[id] = !qbankFilter[id];
  // if nothing selected, re-select all
  if (sections.every(s => !qbankFilter[s.id])) {
    sections.forEach(s => qbankFilter[s.id] = true);
  }
  renderQbankOnly();
}

function toggleQbankAll() {
  const allSelected = sections.every(s => qbankFilter[s.id]);
  sections.forEach(s => qbankFilter[s.id] = !allSelected);
  // if we just deselected all, re-select all
  if (sections.every(s => !qbankFilter[s.id])) {
    sections.forEach(s => qbankFilter[s.id] = true);
  }
  renderQbankOnly();
}

function toggleQbankAr() {
  qbankShowAr = !qbankShowAr;
  renderQbankOnly();
}

function toggleQbankItem(idx) {
  qbankRevealed[idx] = !qbankRevealed[idx];
  const el = document.getElementById('qbi-' + idx);
  if (el) el.classList.toggle('open');
}

function expandAllQbank() {
  quizBank.forEach((_, i) => { qbankRevealed[i] = true; });
  renderQbankOnly();
}

function collapseAllQbank() {
  qbankRevealed = {};
  renderQbankOnly();
}

function renderQbankOnly() {
  if (activeTab !== 'qbank') { render(); return; }
  render();
  // restore search cursor position
  const input = document.getElementById('qbankSearchInput');
  if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
}

// Initial render
render();
</script>
</body>
</html>
