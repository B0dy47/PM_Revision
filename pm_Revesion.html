  {lecture:'planning', q:'EMV for a risk with 30% probability and $10,000 impact is:', q_ar:'القيمة النقدية المتوقعة لمخاطر باحتمالية 30% وتأثير 10,000 دولار هي:', options:['$10,000','$3,000','$30,000','$300'], correct:1, explanation:'EMV = Probability x Impact = 0.30 x $10,000 = $3,000.', explanation_ar:'EMV = الاحتمالية x التأثير = 0.30 x 10,000 = 3,000 دولار.'},
  {lecture:'planning', q:'Resource leveling may result in:', q_ar:'تسوية الموارد قد تؤدي إلى:', options:['Shorter project duration','Extended project schedule','Reduced costs','Elimination of the critical path'], correct:1, explanation:'Resource leveling adjusts activity dates to eliminate resource overloads, which may extend the project schedule.', explanation_ar:'تسوية الموارد تعدل تواريخ الأنشطة لإزالة التحميل الزائد للموارد، مما قد يمدد الجدول الزمني.'},
  {lecture:'planning', q:'A ROM estimate has an accuracy range of approximately:', q_ar:'تقدير الحجم التقريبي (ROM) له نطاق دقة يبلغ تقريبا:', options:['-5% to +10%','-25% to +75%','-10% to +25%','Exactly 0%'], correct:1, explanation:'ROM (Rough Order of Magnitude) estimates have a wide range of -25% to +75% and are used early in the project when little detail is known.', explanation_ar:'تقديرات ROM لها نطاق واسع من -25% إلى +75% وتستخدم في بداية المشروع.'},
  {lecture:'planning', q:'Verification is about ___ while Validation is about ___:', q_ar:'التحقق (Verification) يتعلق بـ ___ بينما المصادقة (Validation) تتعلق بـ ___:', options:['Fitness for use; conformance to requirements','Conformance to requirements; fitness for use','Customer acceptance; technical compliance','Testing; inspection'], correct:1, explanation:'Verification = "Was the product built right?" (conformance to requirements). Validation = "Was the right product built?" (fitness for use/meeting needs).', explanation_ar:'التحقق = "هل تم بناء المنتج بشكل صحيح؟" (المطابقة للمتطلبات). المصادقة = "هل تم بناء المنتج الصحيح؟" (ملاءمة الاستخدام).'},
  // Lecture 4: Execution
  {lecture:'execution', q:'Which knowledge areas have NO executing processes?', q_ar:'أي مجالات معرفية ليس لها عمليات تنفيذ؟', options:['Quality, Risk, Stakeholder','Scope, Schedule, Cost','Integration, Communications','Resource, Procurement'], correct:1, explanation:'Scope, Schedule, and Cost management have no executing processes. They are planned and then monitored/controlled.', explanation_ar:'إدارة النطاق والجدول الزمني والتكلفة ليس لها عمليات تنفيذ. يتم التخطيط لها ثم مراقبتها والتحكم فيها.'},
  {lecture:'execution', q:'A quality audit is:', q_ar:'تدقيق الجودة هو:', options:['A test of the final product','A structured independent review of project compliance with policies','A customer satisfaction survey','A financial review of project costs'], correct:1, explanation:'A quality audit is a structured, independent process to determine if project activities comply with organizational and project policies, processes, and procedures.', explanation_ar:'تدقيق الجودة هو عملية منظمة ومستقلة لتحديد ما إذا كانت أنشطة المشروع تمتثل للسياسات والإجراءات.'},
  {lecture:'execution', q:'Problem solving in project management has how many basic elements?', q_ar:'حل المشكلات في إدارة المشاريع له كم عنصر أساسي؟', options:['4','5','6','8'], correct:2, explanation:'Six basic elements: Define the problem, Identify root causes, Generate solution options, Select best solution, Implement it, Confirm effectiveness.', explanation_ar:'ستة عناصر: تعريف المشكلة، تحديد الأسباب الجذرية، توليد خيارات الحلول، اختيار أفضل حل، تنفيذه، التأكد من فعاليته.'},
  // Lecture 5: Monitor & Control
  {lecture:'monitor', q:'If CPI = 0.85, the project is:', q_ar:'إذا كان مؤشر أداء التكلفة CPI = 0.85، فالمشروع:', options:['Under budget','On budget','Over budget','Cannot be determined'], correct:2, explanation:'CPI < 1 means the project is over budget. For every dollar spent, only $0.85 of work is being completed.', explanation_ar:'CPI أقل من 1 يعني أن المشروع تجاوز الميزانية. لكل دولار يُنفق، يتم إنجاز عمل بقيمة 0.85 دولار فقط.'},
  {lecture:'monitor', q:'CV = EV - AC. If CV is negative, the project is:', q_ar:'انحراف التكلفة CV = EV - AC. إذا كان CV سالبا، فالمشروع:', options:['Under budget','Over budget','Behind schedule','Ahead of schedule'], correct:1, explanation:'A negative CV means the project has spent more than the value of work completed -- it is over budget.', explanation_ar:'CV سالب يعني أن المشروع أنفق أكثر من قيمة العمل المنجز -- أي أنه تجاوز الميزانية.'},
  {lecture:'monitor', q:'EAC = BAC / CPI is used when:', q_ar:'يُستخدم EAC = BAC / CPI عندما:', options:['The variance was a one-time event','Current performance trends are expected to continue','Both schedule and cost need consideration','The project is ahead of schedule'], correct:1, explanation:'EAC = BAC/CPI assumes that the current cost performance trend will continue for the remainder of the project.', explanation_ar:'EAC = BAC/CPI يفترض أن اتجاه أداء التكلفة الحالي سيستمر لبقية المشروع.'},
  {lecture:'monitor', q:'Sunk costs should:', q_ar:'التكاليف الغارقة (Sunk Costs) يجب:', options:['Be included in future project decisions','Not influence future decisions','Be recovered from the project budget','Be charged to the customer'], correct:1, explanation:'Sunk costs are money already spent that cannot be recovered. They should NOT influence future project decisions.', explanation_ar:'التكاليف الغارقة هي أموال تم إنفاقها بالفعل ولا يمكن استردادها. يجب ألا تؤثر على القرارات المستقبلية.'},
  {lecture:'monitor', q:'A Pareto chart is based on:', q_ar:'مخطط باريتو يعتمد على:', options:['The rule of 7','The 80/20 rule','The law of diminishing returns','The triple constraint'], correct:1, explanation:'A Pareto chart is based on the 80/20 rule: approximately 80% of problems come from 20% of causes. It prioritizes which causes to address first.', explanation_ar:'مخطط باريتو يعتمد على قاعدة 80/20: حوالي 80% من المشاكل تأتي من 20% من الأسباب.'},
  {lecture:'monitor', q:'In control charts, the Rule of 7 means:', q_ar:'في مخططات التحكم، قاعدة السبعة تعني:', options:['7 defects maximum allowed','7 consecutive points on one side of the mean indicate an out-of-control process','Control limits are set at 7 standard deviations','7 quality tools must be applied'], correct:1, explanation:'The Rule of 7: if 7 consecutive data points fall on one side of the mean, the process is considered out of control even if all points are within control limits.', explanation_ar:'قاعدة السبعة: إذا سقطت 7 نقاط بيانات متتالية على جانب واحد من المتوسط، تعتبر العملية خارج السيطرة.'},
  {lecture:'monitor', q:'Gold plating differs from scope creep because:', q_ar:'التطعيم الذهبي (Gold Plating) يختلف عن زحف النطاق لأن:', options:['Gold plating is customer-driven; scope creep is team-driven','Gold plating is team-driven extras; scope creep is customer-requested expansion','They are the same thing','Gold plating involves reducing scope'], correct:1, explanation:'Gold plating = project team voluntarily provides extras without customer asking. Scope creep = uncontrolled changes from customer/stakeholders requesting scope expansion.', explanation_ar:'التطعيم الذهبي = فريق المشروع يقدم إضافات طوعية بدون طلب العميل. زحف النطاق = تغييرات غير متحكم فيها من العملاء.'},
  {lecture:'monitor', q:'The Change Control Board (CCB) can:', q_ar:'مجلس التحكم في التغيير (CCB) يمكنه:', options:['Only approve changes','Only reject changes','Approve, reject, defer, or request more information','Only make recommendations to the PM'], correct:2, explanation:'The CCB can approve changes, reject them, defer them, or request more information before making a decision.', explanation_ar:'يمكن لمجلس التحكم في التغيير الموافقة على التغييرات أو رفضها أو تأجيلها أو طلب مزيد من المعلومات.'},
  {lecture:'monitor', q:'Which quality tool is best for determining if a process is stable?', q_ar:'أي أداة جودة هي الأفضل لتحديد ما إذا كانت العملية مستقرة؟', options:['Pareto diagram','Scatter diagram','Control chart','Flowchart'], correct:2, explanation:'Control charts help determine whether a process is in statistical control by establishing a mean and upper/lower control limits.', explanation_ar:'مخططات التحكم تساعد في تحديد ما إذا كانت العملية تحت السيطرة الإحصائية.'},
  {lecture:'monitor', q:'Validate Scope focuses on ___, while Control Quality focuses on ___:', q_ar:'التحقق من النطاق يركز على ___، بينما مراقبة الجودة تركز على ___:', options:['Correctness; acceptance','Acceptance; correctness','Testing; inspection','Process; product'], correct:1, explanation:'Validate Scope = acceptance/fitness for use. Control Quality = correctness/conformance to requirements. Quality control is usually done BEFORE scope validation.', explanation_ar:'التحقق من النطاق = القبول/ملاءمة الاستخدام. مراقبة الجودة = الصحة/المطابقة للمتطلبات.'},
  // Lecture 6: Closing
  {lecture:'closing', q:'How many processes are in the Closing process group?', q_ar:'كم عدد العمليات في مجموعة عمليات الإغلاق؟', options:['1','2','3','5'], correct:0, explanation:'There is only one process in the Closing process group: Close Project or Phase, which belongs to Integration Management.', explanation_ar:'هناك عملية واحدة فقط في مجموعة الإغلاق: إغلاق المشروع أو المرحلة، تنتمي لإدارة التكامل.'},
  {lecture:'closing', q:'Which knowledge area contains the closing process?', q_ar:'أي مجال معرفي يحتوي على عملية الإغلاق؟', options:['Scope Management','Quality Management','Integration Management','Stakeholder Management'], correct:2, explanation:'Close Project or Phase is an Integration Management process -- the only knowledge area with a closing process.', explanation_ar:'إغلاق المشروع أو المرحلة هي عملية إدارة تكامل -- المجال المعرفي الوحيد الذي له عملية إغلاق.'},
  {lecture:'closing', q:'The primary importance of the closing phase includes:', q_ar:'الأهمية الرئيسية لمرحلة الإغلاق تشمل:', options:['Starting new projects','Capturing lessons learned and actual metrics for future projects','Increasing the project budget','Hiring new team members'], correct:1, explanation:'The closing phase is critical for capturing lessons learned and actual metrics that become historical data for estimating and planning future projects.', explanation_ar:'مرحلة الإغلاق حاسمة لالتقاط الدروس المستفادة والمقاييس الفعلية التي تصبح بيانات تاريخية للمشاريع المستقبلية.'},
  {lecture:'closing', q:'Before closing a project, the PM must ensure:', q_ar:'قبل إغلاق المشروع، يجب على مدير المشروع التأكد من:', options:['All contracts are closed and deliverables are accepted','New projects are already assigned to team members','The budget has been fully spent','All risks have been eliminated'], correct:0, explanation:'The PM must ensure contracts are closed (formal acceptance of seller results, finalize claims), deliverables are accepted, and records are archived.', explanation_ar:'يجب على مدير المشروع التأكد من إغلاق العقود (القبول الرسمي لنتائج البائع) وقبول المخرجات وأرشفة السجلات.'},

  // ============ EXPANDED QUESTION BANK ============

  // --- MORE INTRO QUESTIONS ---
  {lecture:'intro', q:'How many processes are defined in the PMBOK 6th Edition?', q_ar:'كم عدد العمليات المحددة في دليل PMBOK الإصدار السادس؟', options:['42','47','49','52'], correct:2, explanation:'The PMBOK 6th Edition defines 49 project management processes spread across five process groups and ten knowledge areas.', explanation_ar:'يحدد دليل PMBOK الإصدار السادس 49 عملية لإدارة المشاريع موزعة على خمس مجموعات عمليات وعشرة مجالات معرفية.'},
  {lecture:'intro', q:'Which of the following is NOT a characteristic of a project?', q_ar:'أي مما يلي ليس من خصائص المشروع؟', options:['Temporary','Unique','Progressive elaboration','Repetitive output'], correct:3, explanation:'Repetitive output is a characteristic of operations, not projects. Projects are temporary, unique, and progressively elaborated.', explanation_ar:'المخرجات المتكررة هي خاصية للعمليات وليس المشاريع. المشاريع مؤقتة وفريدة ويتم توضيحها تدريجيا.'},
  {lecture:'intro', q:'A project manager spends MOST of their time:', q_ar:'يقضي مدير المشروع معظم وقته في:', options:['Writing code','Managing the budget','Communicating','Conducting quality audits'], correct:2, explanation:'According to PMBOK, a project manager spends approximately 90% of their time communicating with stakeholders, team members, and other parties.', explanation_ar:'وفقا لـ PMBOK، يقضي مدير المشروع حوالي 90% من وقته في التواصل مع أصحاب المصلحة وأعضاء الفريق.'},
  {lecture:'intro', q:'Which knowledge area is SPECIFIC to the project manager and no one else?', q_ar:'أي مجال معرفي خاص بمدير المشروع وحده؟', options:['Scope Management','Cost Management','Integration Management','Quality Management'], correct:2, explanation:'Integration Management is specific to the project manager. It involves coordinating all other knowledge areas and is the PM\'s unique responsibility.', explanation_ar:'إدارة التكامل خاصة بمدير المشروع. تتضمن تنسيق جميع المجالات المعرفية الأخرى وهي مسؤولية مدير المشروع الفريدة.'},
  {lecture:'intro', q:'The Monitoring & Controlling process group has processes from:', q_ar:'مجموعة عمليات المراقبة والتحكم لديها عمليات من:', options:['Only 5 knowledge areas','Only 7 knowledge areas','All 10 knowledge areas','Only 8 knowledge areas'], correct:2, explanation:'The Monitoring & Controlling process group is the only group (besides Planning) that has at least one process from all 10 knowledge areas.', explanation_ar:'مجموعة المراقبة والتحكم هي المجموعة الوحيدة (إلى جانب التخطيط) التي لديها عملية واحدة على الأقل من جميع المجالات المعرفية العشرة.'},
  {lecture:'intro', q:'The Executing process group has processes from how many knowledge areas?', q_ar:'مجموعة عمليات التنفيذ لديها عمليات من كم مجال معرفي؟', options:['5','7','8','10'], correct:1, explanation:'The Executing process group has processes from 7 out of 10 knowledge areas. Scope, Schedule, and Cost management have no executing processes.', explanation_ar:'مجموعة التنفيذ لديها عمليات من 7 من أصل 10 مجالات معرفية. إدارة النطاق والجدول الزمني والتكلفة ليس لها عمليات تنفيذ.'},
  {lecture:'intro', q:'An output of one process typically becomes:', q_ar:'مخرج عملية واحدة عادة يصبح:', options:['Irrelevant to other processes','An input to one or more other processes','A constraint on the project','A risk to be managed'], correct:1, explanation:'With very few exceptions, every process output becomes an input to one or more other processes, creating an interconnected system.', explanation_ar:'مع استثناءات قليلة جدا، كل مخرج عملية يصبح مدخلا لعملية أو أكثر من العمليات الأخرى.'},
  {lecture:'intro', q:'Which is the correct definition of a tool vs. a technique?', q_ar:'ما هو التعريف الصحيح للأداة مقابل التقنية؟', options:['Tools are procedures; techniques are tangible items','Tools are tangible items; techniques are systematic procedures','They are the same thing','Tools are inputs; techniques are outputs'], correct:1, explanation:'Tools are tangible things used in performing an activity. Techniques are defined systematic procedures used by a human resource to produce a result.', explanation_ar:'الأدوات هي أشياء ملموسة تستخدم في تنفيذ نشاط. التقنيات هي إجراءات منهجية محددة يستخدمها الأشخاص لإنتاج نتيجة.'},
  {lecture:'intro', q:'Scope management ensures:', q_ar:'إدارة النطاق تضمن:', options:['The project is completed on time','All required work and only required work is completed','The budget is not exceeded','Stakeholders are satisfied'], correct:1, explanation:'Scope management processes ensure that the project includes all the work required and only the work required to complete the project successfully.', explanation_ar:'عمليات إدارة النطاق تضمن أن المشروع يشمل كل العمل المطلوب وفقط العمل المطلوب لإكمال المشروع بنجاح.'},

  // --- MORE INITIATING QUESTIONS ---
  {lecture:'initiating', q:'The project charter authorizes the PM to:', q_ar:'ميثاق المشروع يفوض مدير المشروع بـ:', options:['Complete the entire project','Begin expending resources on planning','Hire external contractors','Change the project scope freely'], correct:1, explanation:'The charter authorizes the project manager to begin expending resources on the project, primarily in terms of planning activities.', explanation_ar:'الميثاق يفوض مدير المشروع بالبدء في إنفاق الموارد على المشروع، بشكل أساسي فيما يتعلق بأنشطة التخطيط.'},
  {lecture:'initiating', q:'Stakeholder satisfaction is primarily achieved through:', q_ar:'رضا أصحاب المصلحة يتحقق بشكل أساسي من خلال:', options:['Increasing the budget','Communication and managing expectations','Completing the project early','Using advanced technology'], correct:1, explanation:'Stakeholder satisfaction comes from fulfilling expectations, which are managed through communication. Managing perceptions of performance is key.', explanation_ar:'رضا أصحاب المصلحة يأتي من تلبية التوقعات التي تتم إدارتها من خلال التواصل. إدارة تصورات الأداء هي المفتاح.'},
  {lecture:'initiating', q:'The first thing a project manager does after being assigned is:', q_ar:'أول شيء يفعله مدير المشروع بعد تعيينه هو:', options:['Create the WBS','Perform stakeholder analysis','Begin executing work','Develop the schedule'], correct:1, explanation:'The first thing the PM does is perform stakeholder analysis. The second is to use that information to ensure the charter is complete and correct.', explanation_ar:'أول شيء يفعله مدير المشروع هو إجراء تحليل أصحاب المصلحة. والثاني هو استخدام تلك المعلومات لضمان اكتمال وصحة الميثاق.'},
  {lecture:'initiating', q:'Management reserves are controlled by:', q_ar:'احتياطي الإدارة يتحكم فيه:', options:['The project manager','The project team','Senior management','The customer'], correct:2, explanation:'Management reserves handle unknown unknowns and are controlled by senior management. Contingency reserves handle known unknowns and are controlled by the PM.', explanation_ar:'احتياطي الإدارة يتعامل مع المجهولات غير المعروفة ويتحكم فيه الإدارة العليا. احتياطي الطوارئ يتحكم فيه مدير المشروع.'},
  {lecture:'initiating', q:'The Stakeholder Importance is calculated as:', q_ar:'أهمية أصحاب المصلحة تُحسب كـ:', options:['Interest + Influence','Interest x Influence (Impact x Power)','Interest - Influence','Interest / Influence'], correct:1, explanation:'Stakeholder Importance = Product of Interest (Impact) and Influence (Power). High importance means both participation and political support are critical.', explanation_ar:'أهمية أصحاب المصلحة = حاصل ضرب الاهتمام (التأثير) والنفوذ (القوة).'},
  {lecture:'initiating', q:'Which of the following is NOT a component of the project charter?', q_ar:'أي مما يلي ليس من مكونات ميثاق المشروع؟', options:['Background and scope','WBS Dictionary','Stakeholders and sign-off','Authorization level'], correct:1, explanation:'The WBS Dictionary is part of the Scope Baseline created during Planning, not the Initiating phase. The charter includes background, scope, cost, time, uncertainty, stakeholders, sign-off, and authorization level.', explanation_ar:'قاموس WBS هو جزء من خط أساس النطاق الذي يتم إنشاؤه أثناء التخطيط وليس مرحلة البدء.'},
  {lecture:'initiating', q:'What determines whether a project is complex for an organization?', q_ar:'ما الذي يحدد ما إذا كان المشروع معقدا بالنسبة للمنظمة؟', options:['The project budget','The number of deliverables','The organization\'s experience and management expertise','The project duration only'], correct:2, explanation:'Experience determines what is complex. What is complex for one organization may not be for another. The more sophisticated the organization, the better it handles big projects.', explanation_ar:'الخبرة هي ما يحدد التعقيد. ما هو معقد لمنظمة قد لا يكون كذلك لأخرى.'},
  {lecture:'initiating', q:'The Initiating process group contains how many processes?', q_ar:'مجموعة عمليات البدء تحتوي على كم عملية؟', options:['1','2','3','5'], correct:1, explanation:'The Initiating process group contains 2 processes: Develop Project Charter and Identify Stakeholders.', explanation_ar:'مجموعة عمليات البدء تحتوي على عمليتين: تطوير ميثاق المشروع وتحديد أصحاب المصلحة.'},

  // --- MORE PLANNING QUESTIONS ---
  {lecture:'planning', q:'The most common relationship type in PDM is:', q_ar:'أكثر أنواع العلاقات شيوعا في PDM هو:', options:['Start-to-Start','Finish-to-Finish','Finish-to-Start','Start-to-Finish'], correct:2, explanation:'Finish-to-Start (FS) is the most common relationship type. The successor activity starts only after the predecessor finishes.', explanation_ar:'إنهاء إلى بدء (FS) هو أكثر أنواع العلاقات شيوعا. النشاط اللاحق يبدأ فقط بعد انتهاء النشاط السابق.'},
  {lecture:'planning', q:'Float (slack) on the critical path is:', q_ar:'الفترة العائمة (Float/Slack) على المسار الحرج تساوي:', options:['Positive','Negative','Zero','Variable'], correct:2, explanation:'Activities on the critical path have zero float/slack. Any delay to a critical path activity directly delays the project end date.', explanation_ar:'الأنشطة على المسار الحرج لها فترة عائمة صفرية. أي تأخير في نشاط المسار الحرج يؤخر تاريخ انتهاء المشروع مباشرة.'},
  {lecture:'planning', q:'Bottom-up estimating is only as accurate as:', q_ar:'التقدير من أسفل لأعلى دقيق فقط بقدر دقة:', options:['The project charter','The WBS','The project manager\'s experience','The schedule baseline'], correct:1, explanation:'Bottom-up estimating is only as accurate as the WBS. If the WBS is incomplete or incorrect, the estimates aggregated from it will also be inaccurate.', explanation_ar:'التقدير من أسفل لأعلى دقيق فقط بقدر دقة هيكل تقسيم العمل (WBS). إذا كان WBS غير مكتمل، ستكون التقديرات غير دقيقة أيضا.'},
  {lecture:'planning', q:'A work package in the WBS is:', q_ar:'حزمة العمل في WBS هي:', options:['The highest level of the WBS','The lowest level of deliverables along each branch','An activity to be performed','A milestone in the schedule'], correct:1, explanation:'Work packages are the lowest level of deliverables along each branch of the WBS. They are deliverable-oriented (expressed as nouns) and the level at which costs and time can be reliably estimated.', explanation_ar:'حزم العمل هي أدنى مستوى من المخرجات على كل فرع من فروع WBS. هي موجهة نحو المخرجات ويتم عندها تقدير التكلفة والوقت بشكل موثوق.'},
  {lecture:'planning', q:'Resource smoothing adjusts activities within:', q_ar:'تنعيم الموارد يعدل الأنشطة ضمن:', options:['The critical path only','The available float/slack','The management reserve','The project budget'], correct:1, explanation:'Resource smoothing optimizes resources within the available total or free float. It does not change the critical path or project end date.', explanation_ar:'تنعيم الموارد يحسن الموارد ضمن الفترة العائمة المتاحة. لا يغير المسار الحرج أو تاريخ انتهاء المشروع.'},
  {lecture:'planning', q:'Which estimating technique is best used early in the project when details are scarce?', q_ar:'أي تقنية تقدير تُستخدم في بداية المشروع عندما تكون التفاصيل شحيحة؟', options:['Bottom-up','Parametric','Analogous','Three-point'], correct:2, explanation:'Analogous estimating uses similar past projects as a basis. It requires little time and effort and is used when all details are not yet known (early planning).', explanation_ar:'التقدير بالمقارنة يستخدم مشاريع سابقة مشابهة. يتطلب وقتا وجهدا قليلين ويستخدم عندما لا تكون كل التفاصيل معروفة بعد.'},
  {lecture:'planning', q:'The Requirements Traceability Matrix (RTM) links requirements to:', q_ar:'مصفوفة تتبع المتطلبات (RTM) تربط المتطلبات بـ:', options:['Only the project schedule','Business and project objectives','Only the cost baseline','The risk register only'], correct:1, explanation:'The RTM links requirements to business and project objectives, ensuring each requirement adds business value and can be tracked throughout the project lifecycle.', explanation_ar:'تربط مصفوفة RTM المتطلبات بأهداف العمل والمشروع، لضمان أن كل متطلب يضيف قيمة عمل ويمكن تتبعه طوال دورة حياة المشروع.'},
  {lecture:'planning', q:'In cost-reimbursable contracts, who assumes the MOST risk?', q_ar:'في عقود التكلفة المسددة، من يتحمل أكبر قدر من المخاطر؟', options:['The seller','The buyer','Risk is equally shared','The project manager'], correct:1, explanation:'In cost-reimbursable (cost-plus) contracts, the buyer assumes the highest risk since costs are uncertain. The buyer must audit invoices carefully.', explanation_ar:'في عقود التكلفة المسددة، المشتري يتحمل أعلى مخاطر لأن التكاليف غير مؤكدة. يجب على المشتري تدقيق الفواتير بعناية.'},
  {lecture:'planning', q:'A residual risk is:', q_ar:'المخاطر المتبقية (Residual Risk) هي:', options:['A new risk created by implementing a risk response','A risk that was never identified','A minor risk remaining after the response strategy is implemented','A risk that has been fully eliminated'], correct:2, explanation:'Residual risk is the minor risk left over after the risk response strategy is implemented. Secondary risk is a NEW risk resulting from implementing a response.', explanation_ar:'المخاطر المتبقية هي المخاطر الصغيرة المتبقية بعد تنفيذ استراتيجية الاستجابة. المخاطر الثانوية هي مخاطر جديدة ناتجة عن تنفيذ الاستجابة.'},
  {lecture:'planning', q:'A secondary risk is:', q_ar:'المخاطر الثانوية (Secondary Risk) هي:', options:['A minor leftover risk after response','A new risk resulting from implementing a risk response','The second risk identified on the register','A risk with low probability'], correct:1, explanation:'A secondary risk is a new risk that arises as a direct result of implementing a risk response strategy. It must also be analyzed and managed.', explanation_ar:'المخاطر الثانوية هي مخاطر جديدة تنشأ كنتيجة مباشرة لتنفيذ استراتيجية استجابة المخاطر. يجب تحليلها وإدارتها أيضا.'},
  {lecture:'planning', q:'The difference between Enhance and Exploit for opportunities is:', q_ar:'الفرق بين التعزيز والاستغلال للفرص هو:', options:['Enhance eliminates the risk; Exploit transfers it','Enhance increases probability; Exploit increases it to 100%','They are the same strategy','Enhance is for threats; Exploit is for opportunities'], correct:1, explanation:'Enhance increases the probability/impact of an opportunity occurring. Exploit is more aggressive -- it aims to make the opportunity happen with 100% certainty.', explanation_ar:'التعزيز يزيد احتمالية/تأثير حدوث الفرصة. الاستغلال أكثر حدة -- يهدف لجعل الفرصة تحدث بنسبة يقين 100%.'},
  {lecture:'planning', q:'An RFP (Request for Proposal) is:', q_ar:'طلب تقديم العروض (RFP) هو:', options:['The least formal bid document','Used only for fixed-price contracts','The most formal bid document with strict procurement rules','A verbal request to sellers'], correct:2, explanation:'An RFP is the most formal of bid documents, with strict procurement rules for content, timeline, and seller responses. It is used when the solution is not straightforward.', explanation_ar:'طلب تقديم العروض هو الأكثر رسمية من وثائق المناقصة، مع قواعد شراء صارمة للمحتوى والجدول الزمني واستجابات البائعين.'},
  {lecture:'planning', q:'Contingency reserve is calculated as:', q_ar:'احتياطي الطوارئ يُحسب كـ:', options:['A fixed percentage of BAC','Sum of EMVs for known risks','An arbitrary amount set by management','The difference between BAC and EAC'], correct:1, explanation:'Contingency reserve = sum of EMVs for known risks (net of threats and opportunities). It is within the cost baseline and controlled by the PM.', explanation_ar:'احتياطي الطوارئ = مجموع القيم النقدية المتوقعة للمخاطر المعروفة. يكون ضمن خط أساس التكلفة ويتحكم فيه مدير المشروع.'},
  {lecture:'planning', q:'85% of the cost of quality is:', q_ar:'85% من تكلفة الجودة هي:', options:['Under the team\'s control','Under management\'s control','Due to external factors','Related to testing costs only'], correct:1, explanation:'According to Deming, 85% of the cost of quality is in management\'s control and is management\'s responsibility. This emphasizes management\'s role in quality.', explanation_ar:'وفقا لـ Deming، 85% من تكلفة الجودة تحت سيطرة الإدارة وهي مسؤولية الإدارة.'},
  {lecture:'planning', q:'Cost of quality includes:', q_ar:'تكلفة الجودة تشمل:', options:['Only prevention costs','Only inspection costs','Cost of conformance and cost of non-conformance','Only failure costs'], correct:2, explanation:'Cost of Quality = Cost of Conformance (Prevention + Appraisal) + Cost of Non-Conformance (Internal and External Failure costs).', explanation_ar:'تكلفة الجودة = تكلفة المطابقة (الوقاية + التقييم) + تكلفة عدم المطابقة (تكاليف الفشل الداخلي والخارجي).'},
  {lecture:'planning', q:'A lead in a schedule relationship means:', q_ar:'التقدم (Lead) في علاقة الجدول الزمني يعني:', options:['The successor is delayed','The successor can start early relative to the predecessor','The predecessor takes longer','The activity has extra float'], correct:1, explanation:'Lead is the amount of time that a successor activity can begin early relative to its predecessor. Lag is a delay of the successor.', explanation_ar:'التقدم هو مقدار الوقت الذي يمكن للنشاط اللاحق أن يبدأ فيه مبكرا بالنسبة للنشاط السابق. التأخر هو تأخير النشاط اللاحق.'},
  {lecture:'planning', q:'The schedule baseline can only be changed through:', q_ar:'خط أساس الجدول الزمني لا يمكن تغييره إلا من خلال:', options:['The project manager\'s decision alone','Formal change control','Team consensus','Stakeholder request'], correct:1, explanation:'The schedule baseline, once established, can only be modified through formal change control approvals. It is the approved version of the schedule model.', explanation_ar:'خط أساس الجدول الزمني بمجرد إنشائه لا يمكن تعديله إلا من خلال موافقات التحكم الرسمي بالتغيير.'},
  {lecture:'planning', q:'Which type of requirements reflects what the product should DO?', q_ar:'أي نوع من المتطلبات يعكس ما يجب أن يفعله المنتج؟', options:['Business requirements','Transition requirements','Functional requirements','Non-functional requirements'], correct:2, explanation:'Functional requirements describe what the product, service, or component should be or how it should operate. Non-functional requirements describe qualities (performance, reliability).', explanation_ar:'المتطلبات الوظيفية تصف ما يجب أن يكون عليه المنتج أو كيف يجب أن يعمل. المتطلبات غير الوظيفية تصف الصفات (الأداء، الموثوقية).'},
  {lecture:'planning', q:'The Critical Chain Method differs from CPM because it:', q_ar:'طريقة السلسلة الحرجة تختلف عن CPM لأنها:', options:['Only considers time constraints','Accounts for both time and resource constraints','Ignores resource availability','Is only used for small projects'], correct:1, explanation:'Critical Chain Method accounts for limited resources, unlike CPM which only considers time. CCM adds duration buffers and focuses on managing both time buffers and resources.', explanation_ar:'طريقة السلسلة الحرجة تأخذ في الاعتبار محدودية الموارد، على عكس CPM التي تأخذ الوقت فقط. تضيف CCM مخازن مؤقتة وتركز على إدارة كل من المخازن المؤقتة والموارد.'},
  {lecture:'planning', q:'A Gantt chart is used to:', q_ar:'مخطط جانت يُستخدم لـ:', options:['Show cost performance','Display the schedule with bar representations of activities','Calculate the critical path','Determine resource requirements'], correct:1, explanation:'A Gantt chart is a bar chart showing schedule activities and their durations against time. It is a visual scheduling tool for communication and tracking.', explanation_ar:'مخطط جانت هو مخطط شريطي يظهر أنشطة الجدول الزمني ومدتها مقابل الوقت. هو أداة جدولة مرئية للتواصل والتتبع.'},
  {lecture:'planning', q:'The WBS is organized by:', q_ar:'يتم تنظيم WBS حسب:', options:['Activities in sequence','Deliverables in a logical hierarchy','Cost accounts only','Risk categories'], correct:1, explanation:'The WBS is a deliverable-oriented hierarchical decomposition. All elements are expressed as nouns (deliverables), not activities. It is organized logically, not by how work will be done.', explanation_ar:'WBS هو تقسيم هرمي موجه نحو المخرجات. كل العناصر تعبر عنها بأسماء (مخرجات) وليس أنشطة. يتم تنظيمه منطقيا وليس حسب كيفية تنفيذ العمل.'},
  {lecture:'planning', q:'The Stakeholder Engagement Assessment Matrix shows:', q_ar:'مصفوفة تقييم مشاركة أصحاب المصلحة تظهر:', options:['Cost impact of stakeholders','Current vs. desired levels of stakeholder engagement','Stakeholder salaries','Project risks related to stakeholders'], correct:1, explanation:'The matrix compares current engagement levels with desired levels for each stakeholder. It uses categories like Unaware, Resistant, Neutral, Supportive, and Leading.', explanation_ar:'المصفوفة تقارن مستويات المشاركة الحالية مع المستويات المرغوبة لكل صاحب مصلحة.'},
  {lecture:'planning', q:'Risk statements are typically formatted as:', q_ar:'بيانات المخاطر عادة تُنسق كـ:', options:['A single word','If/Then statements: If EVENT, then IMPACT','Numerical scores only','Gantt chart entries'], correct:1, explanation:'Risk statements use a structured If/Then format: "If CAUSE occurs, then EVENT will occur, resulting in IMPACT." This ensures clarity and unambiguity.', explanation_ar:'بيانات المخاطر تستخدم صيغة منظمة إذا/عندها: "إذا حدث السبب، عندها سيحدث الحدث، مما يؤدي إلى التأثير."'},
  {lecture:'planning', q:'Qualitative risk analysis is best described as:', q_ar:'التحليل النوعي للمخاطر يُوصف بشكل أفضل بأنه:', options:['Objective numerical analysis using simulations','Subjective prioritization using probability and impact scales','Mathematical calculation of EMV','Cost-benefit analysis of risks'], correct:1, explanation:'Qualitative analysis is subjective (dependent on expert judgment) and prioritizes risks using probability and impact scales. Quantitative analysis is objective using numerical techniques.', explanation_ar:'التحليل النوعي شخصي (يعتمد على حكم الخبراء) ويرتب أولوية المخاطر باستخدام مقاييس الاحتمالية والتأثير. التحليل الكمي موضوعي باستخدام تقنيات رقمية.'},
  {lecture:'planning', q:'Decision tree analysis is a technique of:', q_ar:'تحليل شجرة القرار هو تقنية من تقنيات:', options:['Qualitative risk analysis','Quantitative risk analysis','Scope management','Schedule management'], correct:1, explanation:'Decision tree analysis is a quantitative risk analysis technique that uses EMV to evaluate different decision options and their potential outcomes.', explanation_ar:'تحليل شجرة القرار هو تقنية تحليل كمي للمخاطر تستخدم القيمة النقدية المتوقعة (EMV) لتقييم خيارات القرار المختلفة ونتائجها المحتملة.'},
  {lecture:'planning', q:'A project calendar defines:', q_ar:'تقويم المشروع يحدد:', options:['Stakeholder meetings only','Standard working times including shifts, working days, and non-working times','The critical path','Cost payment schedules'], correct:1, explanation:'A project calendar defines standard working times including working shifts, working days, and non-working times (weekends, holidays). A project may have more than one calendar.', explanation_ar:'تقويم المشروع يحدد أوقات العمل القياسية بما في ذلك نوبات العمل وأيام العمل وأوقات عدم العمل (عطلات نهاية الأسبوع والإجازات).'},
  {lecture:'planning', q:'The PM\'s role in procurement contracts includes all EXCEPT:', q_ar:'دور مدير المشروع في عقود المشتريات يشمل الكل ما عدا:', options:['Understanding and tailoring the contract to the project','Signing the contracts on behalf of the organization','Identifying risks and incorporating risk management','Protecting the relationship with the seller'], correct:1, explanation:'The project manager generally does NOT have authority to sign contracts. That is typically done by authorized procurement personnel. The PM tailors, manages, and protects relationships.', explanation_ar:'مدير المشروع عموما ليس لديه صلاحية توقيع العقود. يتم ذلك عادة من قبل موظفي المشتريات المعتمدين.'},
  {lecture:'planning', q:'Make-or-buy analysis considers all EXCEPT:', q_ar:'تحليل الصنع أو الشراء يأخذ في الاعتبار الكل ما عدا:', options:['Direct and indirect costs','Technical ability of the organization','The project manager\'s personal preferences','Issues of intellectual property'], correct:2, explanation:'Make-or-buy analysis considers costs (direct/indirect), technical ability, capacity, personnel availability, and IP issues -- not personal preferences.', explanation_ar:'تحليل الصنع أو الشراء يأخذ في الاعتبار التكاليف والقدرة التقنية والسعة وتوفر الموظفين وقضايا الملكية الفكرية -- وليس التفضيلات الشخصية.'},

  // --- MORE EXECUTION QUESTIONS ---
  {lecture:'execution', q:'Lessons learned register is created:', q_ar:'سجل الدروس المستفادة يتم إنشاؤه:', options:['Only at the end of the project','Early in the project and updated throughout','Only during the closing phase','After each phase gate review only'], correct:1, explanation:'The lessons learned register is created early in the project and updated continuously throughout the project lifecycle. It captures challenges, problems, and realized risks.', explanation_ar:'يتم إنشاء سجل الدروس المستفادة في وقت مبكر من المشروع ويتم تحديثه باستمرار طوال دورة حياة المشروع.'},
  {lecture:'execution', q:'Design for X (DfX) is:', q_ar:'التصميم لـ X (DfX) هو:', options:['A risk response strategy','A set of technical guidelines for optimizing a specific aspect of product design','A quality audit procedure','A procurement method'], correct:1, explanation:'Design for X is a set of technical guidelines applied during design for optimizing a specific aspect (X) of product development, leading to reduced cost and improved performance.', explanation_ar:'التصميم لـ X هو مجموعة من الإرشادات التقنية المطبقة أثناء التصميم لتحسين جانب معين من تطوير المنتج.'},
  {lecture:'execution', q:'The issue log documents:', q_ar:'سجل القضايا يوثق:', options:['Only resolved problems','Matters in question, under discussion, or in dispute','Only financial issues','Customer complaints exclusively'], correct:1, explanation:'The issue log documents and keeps track of issues -- matters in question, under discussion, or in dispute -- along with responsibility assignments and target resolution dates.', explanation_ar:'سجل القضايا يوثق ويتتبع القضايا -- المسائل المطروحة أو قيد النقاش أو المتنازع عليها -- مع تعيين المسؤوليات وتواريخ الحل المستهدفة.'},
  {lecture:'execution', q:'Manage Quality is an executing process that:', q_ar:'إدارة الجودة هي عملية تنفيذ تقوم بـ:', options:['Tests the final product','Translates quality requirements into testing activities and standards','Only inspects deliverables','Calculates cost of quality'], correct:1, explanation:'Manage Quality translates the quality management plan into executable quality activities. It focuses on quality assurance and process improvement during execution.', explanation_ar:'إدارة الجودة تترجم خطة إدارة الجودة إلى أنشطة جودة قابلة للتنفيذ. تركز على ضمان الجودة وتحسين العمليات أثناء التنفيذ.'},
  {lecture:'execution', q:'Quality improvement methods include all EXCEPT:', q_ar:'طرق تحسين الجودة تشمل الكل ما عدا:', options:['Six Sigma','PDCA cycle','Total Quality Management','Crashing'], correct:3, explanation:'Crashing is a schedule compression technique, not a quality improvement method. Quality improvement methods include Six Sigma, PDCA, TQM, and Lean.', explanation_ar:'الضغط (Crashing) هو تقنية ضغط الجدول الزمني وليس طريقة لتحسين الجودة.'},
  {lecture:'execution', q:'Implement Risk Responses is in which process group?', q_ar:'تنفيذ استجابات المخاطر في أي مجموعة عمليات؟', options:['Planning','Executing','Monitoring & Controlling','Closing'], correct:1, explanation:'Implement Risk Responses is an Executing process. Risk response strategies are planned during Planning but implemented during Execution.', explanation_ar:'تنفيذ استجابات المخاطر هي عملية تنفيذ. يتم تخطيط استراتيجيات الاستجابة للمخاطر أثناء التخطيط ولكن تنفيذها أثناء التنفيذ.'},
  {lecture:'execution', q:'A cause-and-effect diagram is also known as:', q_ar:'مخطط السبب والنتيجة يُعرف أيضا بـ:', options:['Pareto chart','Ishikawa or Fishbone diagram','Control chart','Scatter diagram'], correct:1, explanation:'The cause-and-effect diagram is also called an Ishikawa diagram or Fishbone diagram. It progressively identifies potential factors contributing to an overall effect.', explanation_ar:'مخطط السبب والنتيجة يُسمى أيضا مخطط إيشيكاوا (Ishikawa) أو مخطط عظمة السمكة (Fishbone).'},
  {lecture:'execution', q:'Conduct Procurements involves:', q_ar:'إجراء المشتريات يتضمن:', options:['Planning what to procure','Obtaining seller responses, selecting sellers, and awarding contracts','Closing all contracts','Monitoring seller performance'], correct:1, explanation:'Conduct Procurements is the executing process of obtaining seller responses, selecting sellers, and awarding contracts. Planning is done in Plan Procurement Management.', explanation_ar:'إجراء المشتريات هو عملية التنفيذ للحصول على استجابات البائعين واختيار البائعين ومنح العقود.'},
  {lecture:'execution', q:'Manage Stakeholder Engagement focuses on:', q_ar:'إدارة مشاركة أصحاب المصلحة تركز على:', options:['Identifying stakeholders for the first time','Communicating, addressing issues, and engaging stakeholders in decisions','Removing difficult stakeholders','Only reporting to the sponsor'], correct:1, explanation:'Manage Stakeholder Engagement focuses on continuous communication, addressing issues, managing conflicts, and engaging stakeholders in project decision-making.', explanation_ar:'إدارة مشاركة أصحاب المصلحة تركز على التواصل المستمر ومعالجة القضايا وإدارة النزاعات وإشراك أصحاب المصلحة في صنع القرار.'},
  {lecture:'execution', q:'Direct and Manage Project Work produces which key output?', q_ar:'توجيه وإدارة عمل المشروع تنتج أي مخرج رئيسي؟', options:['Project charter','Deliverables and work performance data','Schedule baseline','Risk register'], correct:1, explanation:'Direct and Manage Project Work produces Deliverables (tangible products) and Work Performance Data (raw observations and measurements from project activities).', explanation_ar:'توجيه وإدارة عمل المشروع تنتج المخرجات (المنتجات الملموسة) وبيانات أداء العمل (الملاحظات والقياسات الخام من أنشطة المشروع).'},

  // --- MORE MONITOR & CONTROL QUESTIONS ---
  {lecture:'monitor', q:'If BAC = $100,000 and CPI = 0.80, what is the EAC (assuming current trends continue)?', q_ar:'إذا كان BAC = 100,000 دولار و CPI = 0.80، ما هو EAC (بافتراض استمرار الاتجاهات الحالية)؟', options:['$80,000','$100,000','$125,000','$120,000'], correct:2, explanation:'EAC = BAC / CPI = $100,000 / 0.80 = $125,000. The project is expected to cost $125,000 if the current cost performance continues.', explanation_ar:'EAC = BAC / CPI = 100,000 / 0.80 = 125,000 دولار. من المتوقع أن يكلف المشروع 125,000 دولار إذا استمر أداء التكلفة الحالي.'},
  {lecture:'monitor', q:'ETC (Estimate to Complete) is calculated as:', q_ar:'التقدير للإكمال (ETC) يُحسب كـ:', options:['BAC - AC','EAC - AC','EV - AC','BAC - EV'], correct:1, explanation:'ETC = EAC - AC. It represents how much more money is needed to finish the project from the current point forward.', explanation_ar:'ETC = EAC - AC. يمثل كم من المال مطلوب إضافيا لإنهاء المشروع من النقطة الحالية.'},
  {lecture:'monitor', q:'VAC (Variance at Completion) is calculated as:', q_ar:'انحراف الاكتمال (VAC) يُحسب كـ:', options:['EAC - BAC','BAC - EAC','AC - EV','EV - PV'], correct:1, explanation:'VAC = BAC - EAC. A positive VAC means the project is expected to finish under budget; negative means over budget.', explanation_ar:'VAC = BAC - EAC. VAC إيجابي يعني أن المشروع من المتوقع أن ينتهي تحت الميزانية؛ سالب يعني تجاوز الميزانية.'},
  {lecture:'monitor', q:'SPI > 1 indicates the project is:', q_ar:'SPI أكبر من 1 يشير إلى أن المشروع:', options:['Behind schedule','On schedule','Ahead of schedule','Over budget'], correct:2, explanation:'SPI (Schedule Performance Index) > 1 means the project is ahead of schedule -- more work has been completed than planned for this point in time.', explanation_ar:'مؤشر أداء الجدول الزمني (SPI) أكبر من 1 يعني أن المشروع متقدم عن الجدول -- تم إنجاز عمل أكثر مما كان مخططا لهذه النقطة الزمنية.'},
  {lecture:'monitor', q:'Straight-line depreciation formula is:', q_ar:'معادلة الاستهلاك بطريقة القسط الثابت هي:', options:['Asset value x Number of periods','(Asset value - Salvage value) / Number of periods','Asset value / Salvage value','Asset value + Salvage value'], correct:1, explanation:'Straight-line depreciation = (Asset value - Salvage value) / Number of periods. This spreads the decrease in value evenly over the asset\'s life.', explanation_ar:'الاستهلاك بالقسط الثابت = (قيمة الأصل - قيمة الإنقاذ) / عدد الفترات. يوزع انخفاض القيمة بالتساوي على عمر الأصل.'},
  {lecture:'monitor', q:'Rent on organization headquarters is which type of cost?', q_ar:'إيجار مقر المنظمة هو أي نوع من التكاليف؟', options:['Direct and variable','Indirect and fixed','Direct and fixed','Indirect and variable'], correct:1, explanation:'Rent on headquarters is indirect (not traceable to a specific project) and fixed (does not change with production volume).', explanation_ar:'إيجار المقر هو غير مباشر (لا يمكن تتبعه لمشروع محدد) وثابت (لا يتغير مع حجم الإنتاج).'},
  {lecture:'monitor', q:'Wages of hourly workers on a specific project are:', q_ar:'أجور العمال بالساعة في مشروع محدد هي:', options:['Indirect and fixed','Direct and variable','Indirect and variable','Direct and fixed'], correct:1, explanation:'Hourly wages on a specific project are direct (traceable to that project) and variable (change based on hours worked / production volume).', explanation_ar:'أجور العمال بالساعة في مشروع محدد هي مباشرة (يمكن تتبعها لذلك المشروع) ومتغيرة (تتغير بناء على ساعات العمل).'},
  {lecture:'monitor', q:'A flowchart is the best tool when:', q_ar:'المخطط الانسيابي هو أفضل أداة عندما:', options:['You need to find correlation between variables','You suspect a step in a process is being skipped','You want to prioritize defect causes','You need to determine if a process is stable'], correct:1, explanation:'A flowchart represents a workflow or process step by step. It is ideal when you suspect developers or workers are skipping a step in the process.', explanation_ar:'المخطط الانسيابي يمثل سير العمل أو العملية خطوة بخطوة. مثالي عندما تشك في أن المطورين أو العمال يتخطون خطوة في العملية.'},
  {lecture:'monitor', q:'A scatter diagram is used to:', q_ar:'مخطط التشتت يُستخدم لـ:', options:['Show frequency distribution','Determine if a process is stable','Examine correlation between two variables','Prioritize problems by frequency'], correct:2, explanation:'A scatter diagram plots values of two variables to reveal any correlation present. Used to determine if there is a relationship between factors like productivity and experience.', explanation_ar:'مخطط التشتت يرسم قيم متغيرين لكشف أي ارتباط موجود. يستخدم لتحديد ما إذا كانت هناك علاقة بين عوامل مثل الإنتاجية والخبرة.'},
  {lecture:'monitor', q:'Statistical sampling with attribute sampling means:', q_ar:'أخذ العينات الإحصائية مع أخذ عينات السمات تعني:', options:['Measuring the degree of conformity','Determining if a sample conforms (right/wrong, pass/fail)','Counting the number of defects','Calculating the mean of all samples'], correct:1, explanation:'Attribute sampling determines whether a sample conforms or not (binary: right/wrong, true/false, pass/fail). Variable sampling measures the degree of conformity.', explanation_ar:'أخذ عينات السمات يحدد ما إذا كانت العينة مطابقة أم لا (ثنائي: صح/خطأ، نجاح/فشل). أخذ عينات المتغيرات يقيس درجة المطابقة.'},
  {lecture:'monitor', q:'A check sheet is best described as:', q_ar:'صحيفة الفحص توصف بشكل أفضل بأنها:', options:['A control chart','A form for collecting data in real time at the source','A type of scatter diagram','A project schedule'], correct:1, explanation:'A check sheet (tally sheet) is a form used to collect data in real time at the location where data is generated. It serves as a job aid for inspectors.', explanation_ar:'صحيفة الفحص هي نموذج يستخدم لجمع البيانات في الوقت الفعلي في موقع توليد البيانات. تعمل كأداة مساعدة للمفتشين.'},
  {lecture:'monitor', q:'Scope creep is BEST prevented by:', q_ar:'زحف النطاق يتم منعه بشكل أفضل عن طريق:', options:['Increasing the budget','Formal change control process','Adding more team members','Reducing quality standards'], correct:1, explanation:'Scope creep is uncontrolled change. It is best prevented through a formal change control process where all changes must be reviewed and approved by the CCB.', explanation_ar:'زحف النطاق هو تغيير غير متحكم فيه. يتم منعه بشكل أفضل من خلال عملية تحكم رسمية بالتغيير حيث يجب مراجعة جميع التغييرات والموافقة عليها من CCB.'},
  {lecture:'monitor', q:'Configuration control is concerned with:', q_ar:'التحكم في التكوين يتعلق بـ:', options:['Managing the project budget','Specifications of products and processes','The project schedule only','Stakeholder communication'], correct:1, explanation:'Configuration control is concerned with the specifications of products and processes. It involves formal processes for recognition, status reporting, and compliance determination.', explanation_ar:'التحكم في التكوين يتعلق بمواصفات المنتجات والعمليات. يتضمن عمليات رسمية للتعرف والإبلاغ عن الحالة وتحديد الامتثال.'},
  {lecture:'monitor', q:'Rebaselining differs from revision because it:', q_ar:'إعادة خط الأساس تختلف عن المراجعة لأنها:', options:['Is done frequently','Requires a formally approved change','Does not need approval','Only applies to the cost baseline'], correct:1, explanation:'Rebaselining requires a formally approved change through change control. Revisions (recording performance, updating estimates) do not necessarily require formal change control.', explanation_ar:'إعادة خط الأساس تتطلب تغييرا معتمدا رسميا من خلال التحكم بالتغيير. المراجعات لا تتطلب بالضرورة تحكما رسميا بالتغيير.'},
  {lecture:'monitor', q:'The 50/50 rule in earned value means:', q_ar:'قاعدة 50/50 في القيمة المكتسبة تعني:', options:['Half the budget is for contingency','50% credit when work starts, 50% when it finishes','CPI should always equal 0.50','Half the work is on the critical path'], correct:1, explanation:'The 50/50 is a fixed formula rule for EV data collection: 50% of the value is assigned when work begins, and the remaining 50% when the work is completed.', explanation_ar:'50/50 هي قاعدة صيغة ثابتة لجمع بيانات القيمة المكتسبة: 50% من القيمة تُخصص عند بدء العمل و50% المتبقية عند اكتمال العمل.'},
  {lecture:'monitor', q:'A workaround is:', q_ar:'الحل المؤقت (Workaround) هو:', options:['A planned response to a known risk','An unplanned response to a risk that has occurred with no contingency plan','A type of schedule compression','A formal change request'], correct:1, explanation:'A workaround is an unplanned response performed when no contingency plan exists. It is created ad hoc to deal with unanticipated risks that have occurred.', explanation_ar:'الحل المؤقت هو استجابة غير مخططة يتم تنفيذها عندما لا توجد خطة طوارئ. يتم إنشاؤه حسب الحاجة للتعامل مع مخاطر غير متوقعة حدثت.'},
  {lecture:'monitor', q:'Benchmarking in quality management is:', q_ar:'المقارنة المعيارية (Benchmarking) في إدارة الجودة هي:', options:['Testing every product unit','Comparing processes and metrics to industry bests and best practices','Setting arbitrary quality targets','Measuring only internal performance'], correct:1, explanation:'Benchmarking is comparing business processes and performance metrics to industry bests and best practices from other companies to establish a basis for measuring performance.', explanation_ar:'المقارنة المعيارية هي مقارنة عمليات الأعمال ومقاييس الأداء بأفضل الممارسات في الصناعة والشركات الأخرى.'},
  {lecture:'monitor', q:'Force field analysis identifies:', q_ar:'تحليل مجال القوى يحدد:', options:['The critical path','Driving and blocking forces for/against a change','Cost variances','Resource requirements'], correct:1, explanation:'Force field analysis provides a framework for looking at forces driving movement toward a goal or blocking movement toward a goal. It helps evaluate whether to proceed with a change.', explanation_ar:'تحليل مجال القوى يوفر إطارا للنظر في القوى التي تدفع الحركة نحو الهدف أو تعيق الحركة نحو الهدف.'},
  {lecture:'monitor', q:'Control charts use control limits set at:', q_ar:'مخططات التحكم تستخدم حدود تحكم محددة عند:', options:['1 standard deviation (68%)','2 standard deviations (95%)','3 standard deviations (99.73%)','4 standard deviations (99.99%)'], correct:2, explanation:'Control charts establish upper and lower control limits at 3 standard deviations (99.73%) above and below the mean. Points outside these limits indicate special-cause variations.', explanation_ar:'مخططات التحكم تحدد حدود التحكم العليا والسفلى عند 3 انحرافات معيارية (99.73%) فوق وتحت المتوسط.'},

  // --- MORE CLOSING QUESTIONS ---
  {lecture:'closing', q:'Closing occurs:', q_ar:'الإغلاق يحدث:', options:['Only at the very end of the project','At the end of each phase and at the end of the project','Only when the project is cancelled','Only when the sponsor requests it'], correct:1, explanation:'Closing occurs at the end of each phase AND at the end of the project. Administrative closing procedures must be followed at each point, whether the phase achieved its objectives or was terminated.', explanation_ar:'الإغلاق يحدث في نهاية كل مرحلة وفي نهاية المشروع. يجب اتباع إجراءات الإغلاق الإداري في كل نقطة.'},
  {lecture:'closing', q:'The correct flow of deliverables through the process groups is:', q_ar:'التدفق الصحيح للمخرجات عبر مجموعات العمليات هو:', options:['Execute -> Close -> Quality Control -> Validate','Execute -> Quality Control -> Validate Scope -> Close','Validate -> Execute -> Quality Control -> Close','Quality Control -> Execute -> Validate -> Close'], correct:1, explanation:'Direct & Manage Project Work (Deliverables) -> Control Quality (Verified Deliverables) -> Validate Scope (Accepted Deliverables) -> Close Project or Phase.', explanation_ar:'توجيه وإدارة عمل المشروع (المخرجات) -> مراقبة الجودة (المخرجات المتحققة) -> التحقق من النطاق (المخرجات المقبولة) -> إغلاق المشروع أو المرحلة.'},
  {lecture:'closing', q:'During closing, lessons learned are important because:', q_ar:'خلال الإغلاق، الدروس المستفادة مهمة لأنها:', options:['They increase the current project\'s budget','They provide historical data for estimating future projects','They are required by law','They are only used for internal audits'], correct:1, explanation:'Lessons learned and actual metrics captured during closing become historical data used for estimating, planning, and risk management in future projects.', explanation_ar:'الدروس المستفادة والمقاييس الفعلية التي يتم التقاطها أثناء الإغلاق تصبح بيانات تاريخية تستخدم في التقدير والتخطيط وإدارة المخاطر في المشاريع المستقبلية.'},
  {lecture:'closing', q:'If a contract is in place, it must be closed:', q_ar:'إذا كان هناك عقد قائم، يجب إغلاقه:', options:['After the project administrative closure','Before the project administrative closure can be completed','Only if the customer requests it','It closes automatically'], correct:1, explanation:'If a contract is in place and the project is ending, the contract must be closed before the administrative closure of the project can be completed.', explanation_ar:'إذا كان هناك عقد وكان المشروع ينتهي، يجب إغلاق العقد قبل أن يتم إكمال الإغلاق الإداري للمشروع.'},
  {lecture:'closing', q:'Releasing project resources happens during:', q_ar:'تحرير موارد المشروع يحدث خلال:', options:['Initiating','Planning','Executing','Closing'], correct:3, explanation:'Releasing project resources is a closing activity. During Close Project or Phase, resources that are no longer needed are formally released.', explanation_ar:'تحرير موارد المشروع هو نشاط إغلاق. خلال إغلاق المشروع أو المرحلة، يتم تحرير الموارد التي لم تعد مطلوبة رسميا.'},
  {lecture:'closing', q:'The final project report is created during:', q_ar:'التقرير النهائي للمشروع يتم إنشاؤه خلال:', options:['Planning phase','Execution phase','Monitoring & Controlling','Closing phase'], correct:3, explanation:'The final project report is created and distributed during the Closing phase as part of administrative closure activities.', explanation_ar:'يتم إنشاء وتوزيع التقرير النهائي للمشروع خلال مرحلة الإغلاق كجزء من أنشطة الإغلاق الإداري.'},
  {lecture:'closing', q:'Project records are archived during closing primarily to:', q_ar:'يتم أرشفة سجلات المشروع أثناء الإغلاق بشكل أساسي لـ:', options:['Meet legal requirements only','Serve as reference for future projects and organizational learning','Prove the PM did their job','Reduce storage costs'], correct:1, explanation:'Archiving project records serves as reference for future projects, supports organizational learning, and provides templates and historical data for estimation.', explanation_ar:'أرشفة سجلات المشروع تعمل كمرجع للمشاريع المستقبلية وتدعم التعلم المؤسسي وتوفر قوالب وبيانات تاريخية للتقدير.'}
];

  {lecture:'Introduction to PM', notes:[
    {type:'rule',title:'The Triple Constraint',en:'Every project must balance <strong>Scope, Time, and Cost</strong>. Changing one always affects the others. Quality sits at the center -- it is affected by any change to the three constraints.',ar:'كل مشروع يجب أن يوازن بين <strong>النطاق والوقت والتكلفة</strong>. تغيير أي واحد يؤثر دائما على الآخرين. الجودة في المركز -- تتأثر بأي تغيير في القيود الثلاثة.'},
    {type:'warn',title:'49 Processes, 5 Groups, 10 Knowledge Areas',en:'Memorize the framework: <strong>49 processes</strong> organized into <strong>5 process groups</strong> (Initiating, Planning, Executing, M&C, Closing) and <strong>10 knowledge areas</strong>. Planning has the most (24). Closing has the fewest (1).',ar:'احفظ الإطار: <strong>49 عملية</strong> منظمة في <strong>5 مجموعات عمليات</strong> و<strong>10 مجالات معرفية</strong>. التخطيط لديه الأكثر (24). الإغلاق لديه الأقل (1).'},
    {type:'tip',title:'PM spends 90% of time communicating',en:'This is a frequently tested fact. The project manager\'s primary role is communication -- with stakeholders, team, sponsors, and customers.',ar:'هذه حقيقة يتم اختبارها بشكل متكرر. الدور الأساسي لمدير المشروع هو التواصل -- مع أصحاب المصلحة والفريق والرعاة والعملاء.'},
    {type:'rule',title:'Operations vs Projects',en:'<strong>Operations</strong> = permanent, repetitive, ongoing. <strong>Projects</strong> = temporary, unique, defined start/end. If someone asks "is running a factory a project?" the answer is NO -- that is operations.',ar:'<strong>العمليات</strong> = دائمة، متكررة، مستمرة. <strong>المشاريع</strong> = مؤقتة، فريدة، بداية/نهاية محددة.'},
    {type:'warn',title:'Integration Management is PM-specific',en:'Integration Management is the ONLY knowledge area that is specific to the project manager. No one else can perform integration -- it is the PM\'s unique responsibility to coordinate all other areas.',ar:'إدارة التكامل هي المجال المعرفي الوحيد الخاص بمدير المشروع. لا أحد غيره يمكنه تنفيذ التكامل.'},
  ]},
  {lecture:'Initiating', notes:[
    {type:'rule',title:'Charter comes BEFORE the PM',en:'The project charter is normally created by initiating stakeholders <strong>before</strong> the PM is assigned. The PM then refines it based on stakeholder analysis. The charter gives the project life.',ar:'يتم إنشاء ميثاق المشروع عادة من قبل أصحاب المصلحة المبادرين <strong>قبل</strong> تعيين مدير المشروع.'},
    {type:'warn',title:'Success = Stakeholder Satisfaction, NOT just on time/budget',en:'A project can be on time and under budget and STILL fail if stakeholders are not satisfied. True success is measured by stakeholder satisfaction, not just meeting planned targets.',ar:'المشروع يمكن أن يكون في الوقت المحدد وتحت الميزانية ومع ذلك يفشل إذا لم يكن أصحاب المصلحة راضين.'},
    {type:'tip',title:'Known Unknowns vs Unknown Unknowns',en:'<strong>Known unknowns</strong> = things you know to worry about --> handled by <strong>contingency reserves</strong> (PM controls). <strong>Unknown unknowns</strong> = things you don\'t know about --> handled by <strong>management reserves</strong> (senior management controls).',ar:'<strong>المجهولات المعروفة</strong> = احتياطي الطوارئ (يتحكم فيه مدير المشروع). <strong>المجهولات غير المعروفة</strong> = احتياطي الإدارة (تتحكم فيه الإدارة العليا).'},
    {type:'rule',title:'Stakeholder Priority Ranking: No Ties Allowed',en:'When ranking stakeholder priorities across Time, Cost, Scope, Quality -- each MUST get a different rank (1-4). No ties allowed. This forces stakeholders to reveal what truly matters most.',ar:'عند ترتيب أولويات أصحاب المصلحة عبر الوقت والتكلفة والنطاق والجودة -- كل واحد يجب أن يحصل على ترتيب مختلف (1-4). لا يوجد تعادل.'},
  ]},
  {lecture:'Planning', notes:[
    {type:'formula',title:'PERT Formula (Three-Point Estimate)',en:'<strong>E = (P + 4M + O) / 6</strong> where P=Pessimistic, M=Most Likely, O=Optimistic. This is weighted toward the most likely estimate.',ar:'<strong>E = (P + 4M + O) / 6</strong> حيث P=متشائم، M=الأرجح، O=متفائل. يميل للتقدير الأرجح.'},
    {type:'rule',title:'Critical Path = Longest Path = Shortest Duration',en:'The critical path is the <strong>longest</strong> path through the network, which determines the <strong>shortest</strong> possible project duration. These two phrases mean the same thing. Float on CP = 0.',ar:'المسار الحرج هو <strong>أطول</strong> مسار عبر الشبكة، ويحدد <strong>أقصر</strong> مدة ممكنة للمشروع. الفترة العائمة على المسار الحرج = صفر.'},
    {type:'warn',title:'Scope Baseline = 3 Components',en:'Scope Baseline = <strong>Scope Statement + WBS + WBS Dictionary</strong>. All THREE are required. Missing one means the baseline is incomplete. This is a common exam trap.',ar:'خط أساس النطاق = <strong>بيان النطاق + هيكل تقسيم العمل + قاموس WBS</strong>. الثلاثة مطلوبون.'},
    {type:'tip',title:'Crashing vs Fast Tracking',en:'<strong>Crashing</strong> = add resources to critical path (costs more). <strong>Fast Tracking</strong> = overlap sequential activities (increases risk). Both compress the schedule, but with different tradeoffs.',ar:'<strong>الضغط</strong> = إضافة موارد للمسار الحرج (تكلفة أكثر). <strong>التتبع السريع</strong> = تداخل الأنشطة المتسلسلة (مخاطر أكثر).'},
    {type:'rule',title:'Risk Response: Threats vs Opportunities',en:'<strong>Threats</strong>: Escalate, Avoid, Transfer, Mitigate, Accept. <strong>Opportunities</strong>: Escalate, Exploit, Share, Enhance, Accept. Exploit increases probability to 100%. Enhance just increases it.',ar:'<strong>التهديدات</strong>: تصعيد، تجنب، نقل، تخفيف، قبول. <strong>الفرص</strong>: تصعيد، استغلال، مشاركة، تعزيز، قبول.'},
    {type:'warn',title:'Contract Risk: Who bears most?',en:'<strong>Fixed-Price</strong> = seller bears most risk. <strong>Cost-Plus</strong> = buyer bears most risk. <strong>T&M</strong> = balanced risk. Insurance = Transfer strategy.',ar:'<strong>سعر ثابت</strong> = البائع يتحمل أكبر مخاطر. <strong>تكلفة مسددة</strong> = المشتري يتحمل أكبر مخاطر. <strong>وقت ومواد</strong> = مخاطر متوازنة.'},
    {type:'formula',title:'EMV & Contingency Reserve',en:'<strong>EMV = Probability x Impact</strong>. Contingency Reserve = Sum of EMVs (known risks, PM controls). Management Reserve = for unknown risks (senior management controls). Reserve is NET of threats and opportunities.',ar:'<strong>EMV = الاحتمالية x التأثير</strong>. احتياطي الطوارئ = مجموع EMVs (مخاطر معروفة). احتياطي الإدارة = للمخاطر غير المعروفة.'},
    {type:'tip',title:'Residual vs Secondary Risk',en:'<strong>Residual risk</strong> = minor risk LEFT OVER after applying a response. <strong>Secondary risk</strong> = NEW risk CAUSED BY implementing a response. Both must be documented and managed.',ar:'<strong>المخاطر المتبقية</strong> = مخاطر صغيرة متبقية بعد تطبيق الاستجابة. <strong>المخاطر الثانوية</strong> = مخاطر جديدة ناتجة عن تنفيذ الاستجابة.'},
    {type:'warn',title:'Verification vs Validation',en:'<strong>Verification</strong> = "Did we build it RIGHT?" (conformance to requirements). <strong>Validation</strong> = "Did we build the RIGHT thing?" (fitness for use). Remember: Verification = V for "correct", Validation = V for "value to customer".',ar:'<strong>التحقق</strong> = "هل بنيناه بشكل صحيح؟" (المطابقة). <strong>المصادقة</strong> = "هل بنينا الشيء الصحيح؟" (الملاءمة).'},
    {type:'rule',title:'85% of Quality Cost is Management\'s Responsibility',en:'According to Deming, 85% of the cost of quality is under management\'s control. The PM is responsible for product quality. The team is responsible for task quality. Senior management is responsible for organizational quality.',ar:'وفقا لـ Deming، 85% من تكلفة الجودة تحت سيطرة الإدارة. مدير المشروع مسؤول عن جودة المنتج. الفريق مسؤول عن جودة المهمة.'},
  ]},
  {lecture:'Execution', notes:[

  {lecture:'Monitoring & Controlling', notes:[

    {type:'warn',title:'Scope Creep vs Gold Plating',en:'<strong>Scope Creep</strong> = customer-driven uncontrolled expansion. <strong>Gold Plating</strong> = team-driven extras without customer asking. BOTH are bad. Only formal change control prevents scope creep.',ar:'<strong>زحف النطاق</strong> = توسع غير متحكم فيه من العميل. <strong>التطعيم الذهبي</strong> = إضافات من الفريق بدون طلب العميل. كلاهما سيء.'},
    {type:'tip',title:'Validate Scope BEFORE Close, Quality Control BEFORE Validate',en:'The flow is: Execute (Deliverables) --> Control Quality (Verified) --> Validate Scope (Accepted) --> Close. Quality control checks correctness first, then scope validation checks acceptance.',ar:'التدفق: التنفيذ (المخرجات) --> مراقبة الجودة (متحققة) --> التحقق من النطاق (مقبولة) --> الإغلاق.'},

    {type:'formula',title:'Straight-Line Depreciation',en:'<strong>(Asset Value - Salvage Value) / Number of Periods</strong>. Example: Asset=$12K, Salvage=$1K, 3 periods --> ($12K-$1K)/3 = $3,667/period.',ar:'<strong>(قيمة الأصل - قيمة الإنقاذ) / عدد الفترات</strong>.'},
